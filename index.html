<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a18">
    <title>HF Vault</title>
    <style>
        :root {
            --bg:#1a1a18; --sf:#252523; --s2:#2c2c2a; --s3:#343432;
            --br:rgba(255,255,255,0.08);
            --tx:#f0efe9; --t2:#b4b2a9; --t3:#666660;
            --red:#F09595; --rbg:#3d1515; --rm:#A32D2D;
            --amb:#EF9F27; --abg:#3d2800; --am:#854F0B;
            --grn:#97C459; --gbg:#1a2e08; --gm:#3B6D11;
            --blu:#85B7EB; --bbg:#0c2240; --bm:#185FA5;
            --pur:#C4B5FD; --pbg:#1e1a3d; --pm:#5B4FBF;
            --r:14px; --rs:8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--tx); font-size: 15px; line-height: 1.5; overflow: hidden; height: 100vh; }
        
        /* PIN Screen */
        .pin-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
        .pin-screen.hidden { display: none; }
        .pin-dots { display: flex; gap: 14px; margin-bottom: 32px; }
        .pin-dot { width: 16px; height: 16px; border-radius: 50%; background: var(--s3); border: 2px solid var(--br); transition: all .15s; }
        .pin-dot.filled { background: var(--blu); border-color: var(--bm); }
        .pin-dot.error { background: var(--red); border-color: var(--rm); animation: shake 0.2s 2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(5px); } }
        
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
        .pin-key { background: var(--sf); border: 0.5px solid var(--br); border-radius: var(--r); padding: 20px; font-size: 22px; font-weight: 600; cursor: pointer; text-align: center; user-select: none; }
        .pin-key:active { background: var(--s3); }

        /* Main UI */
        .nav { display: flex; background: var(--sf); border-bottom: 1px solid var(--br); position: sticky; top: 0; z-index: 100; }
        .nb { flex: 1; padding: 15px; font-size: 12px; font-weight: 700; color: var(--t3); background: none; border: none; border-bottom: 2px solid transparent; text-transform: uppercase; }
        .nb.on { color: var(--blu); border-bottom-color: var(--blu); }

        .panel { display: none; padding: 12px; max-width: 600px; margin: 0 auto; height: calc(100vh - 50px); overflow-y: auto; }
        .panel.on { display: block; }
        
        .card { background: var(--sf); border-radius: var(--r); border: 0.5px solid var(--br); padding: 16px; margin-bottom: 12px; }
        .btn { display: block; width: 100%; padding: 14px; border-radius: var(--rs); border: none; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 8px; text-align: center; color: var(--tx); }
        .btno { background: var(--s2); border: 1px solid var(--br); }
        .btng { background: var(--gbg); color: var(--grn); border: 1px solid var(--gm); }

        .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .sok { background: var(--grn); } .serr { background: var(--red); } .spend { background: var(--amb); }

        /* Progress Bar */
        .prog-wrap { height: 6px; background: var(--s2); border-radius: 3px; overflow: hidden; margin-top: 8px; }
        .prog-fill { height: 100%; background: var(--blu); transition: width 0.5s ease-out; }

        /* Modal */
        .mbg { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
        .mbg.show { display: flex; }
        .modal { background: var(--sf); border-radius: var(--r) var(--r) 0 0; padding: 24px; width: 100%; max-width: 500px; border-top: 1px solid var(--br); }
        input { width: 100%; background: var(--s2); border: 1px solid var(--br); padding: 14px; color: var(--tx); border-radius: var(--rs); margin-bottom: 12px; font-size: 18px; outline: none; }
    </style>
</head>
<body>

<div class="pin-screen" id="pin-screen">
    <div style="font-size:32px; margin-bottom:12px;">🛡️</div>
    <div style="font-size:20px; font-weight:700; letter-spacing: 0.5px;">SECURE ACCESS</div>
    <div style="font-size:11px; color:var(--t3); margin-bottom:32px; text-transform: uppercase;">Encrypted Tracker v2.1</div>
    <div class="pin-dots">
        <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-grid">
        <div class="pin-key" onclick="pinKey('1')">1</div><div class="pin-key" onclick="pinKey('2')">2</div><div class="pin-key" onclick="pinKey('3')">3</div>
        <div class="pin-key" onclick="pinKey('4')">4</div><div class="pin-key" onclick="pinKey('5')">5</div><div class="pin-key" onclick="pinKey('6')">6</div>
        <div class="pin-key" onclick="pinKey('7')">7</div><div class="pin-key" onclick="pinKey('8')">8</div><div class="pin-key" onclick="pinKey('9')">9</div>
        <div class="pin-key" style="visibility:hidden"></div><div class="pin-key" onclick="pinKey('0')">0</div><div class="pin-key" onclick="pinDel()">⌫</div>
    </div>
</div>

<nav class="nav" id="main-nav" style="display:none;">
    <button class="nb on" onclick="sw('week',this)">Ledger</button>
    <button class="nb" onclick="sw('snowball',this)">Snowball</button>
</nav>

<div class="panel on" id="p-week" style="display:none;">
    <div class="card">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div class="btno" style="padding:14px; border-radius:var(--rs); text-align:center;" onclick="openEdit('bal4496', '#4496 Balance')">
                <div style="font-size:10px; color:var(--t3); margin-bottom:4px;">#4496 CHECKING</div>
                <div style="font-size:18px; font-weight:700; color:var(--blu);" id="v4496">--</div>
            </div>
            <div class="btno" style="padding:14px; border-radius:var(--rs); text-align:center;" onclick="openEdit('bal0725', 'Savings Balance')">
                <div style="font-size:10px; color:var(--t3); margin-bottom:4px;">#0725 SAVINGS</div>
                <div style="font-size:18px; font-weight:700; color:var(--pur);" id="v0725">--</div>
            </div>
        </div>
        <div style="text-align:center; margin-top:16px; font-size:10px; color:var(--t3);">
            <span class="sync-dot" id="sync-dot"></span> <span id="sync-lbl">encrypted connection</span>
        </div>
    </div>
    <div id="roadmap"></div>
</div>

<div class="panel" id="p-snowball" style="display:none;">
    <div id="snow-list"></div>
</div>

<div class="mbg" id="mbg" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <div id="mtitle" style="font-size:16px; font-weight:700; margin-bottom:16px;"></div>
        <input type="number" id="m-amt" placeholder="0.00" inputmode="decimal">
        <button class="btn btng" onclick="saveEdit()">Update Ledger</button>
        <button class="btn btno" onclick="closeModal()">Dismiss</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, onValue, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDsd7Pr0AEQ3j6n-bKXv7n06vYf9Hvew7Y",
        authDomain: "hf-tracker-81e76.firebaseapp.com",
        databaseURL: "https://hf-tracker-81e76-default-rtdb.firebaseio.com",
        projectId: "hf-tracker-81e76",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let stateRef = null;
    let S = { bal4496: 0, bal0725: 0, phaseDone: {} };
    let saveTimer = null;
    let pinEntry = '';
    const SALT = "hf_proactive_vault_2026"; 

    // --- RECOVERED DATA ---
    const BILLS = [
        { n: "Rent", a: 1200, d: 1 },
        { n: "Utilities", a: 160, d: 15 },
        { n: "Insurance", a: 110, d: 20 },
        { n: "TN Unempl.", a: 50, d: 5 },
        { n: "IRS 2024", a: 100, d: 15 }
    ];

    const PHASES = [
        { id: 'tires_j', n: "Jon's Tires & Oil", t: 600 },
        { id: 'repair', n: "Repair Buffer (Savings)", t: 1000 },
        { id: 'tires_k', n: "Karen's Tires", t: 550 },
        { id: 'dental', n: "Dental Work", t: 800 },
        { id: 'eye', n: "Eye Care", t: 300 }
    ];

    // --- PROJECTOR BRAIN ---
    function renderProjector() {
        const cont = document.getElementById('roadmap');
        let html = `<div style="font-size:11px; color:var(--t3); margin:20px 0 8px; font-weight:700; text-transform:uppercase;">Next 14 Days</div>`;
        
        let simBal = S.bal4496;
        let now = new Date();
        let currentDay = now.getDate();

        // 1. Upcoming Bills logic
        let billsDue = BILLS.filter(b => b.d >= currentDay && b.d <= currentDay + 14);
        html += `<div class="card" style="border-left:4px solid var(--amb)">`;
        if(billsDue.length === 0) {
            html += `<div style="font-size:13px; color:var(--t2)">No major bills due in next 14 days.</div>`;
        } else {
            billsDue.forEach(b => {
                let statusColor = simBal >= b.a ? 'var(--grn)' : 'var(--red)';
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:4px; font-size:13px; color:${statusColor}">
                            <span>${b.n} (${b.d}th)</span><span>$${b.a}</span>
                         </div>`;
                simBal -= b.a;
            });
        }
        html += `</div>`;

        // 2. Life Phase Tracker
        html += `<div style="font-size:11px; color:var(--t3); margin:20px 0 8px; font-weight:700; text-transform:uppercase;">Strategy Milestones</div>`;
        PHASES.forEach(p => {
            let progress = 0;
            if(p.id === 'repair') progress = (S.bal0725 / p.t) * 100;
            
            html += `<div class="card" style="border-left:4px solid var(--blu)">
                        <div style="display:flex; justify-content:space-between; font-weight:700; font-size:14px; margin-bottom:4px;">
                            <span>${p.n}</span><span>$${p.t}</span>
                        </div>
                        <div class="prog-wrap"><div class="prog-fill" style="width:${Math.min(progress, 100)}%"></div></div>
                        <div style="font-size:11px; color:var(--t3); margin-top:8px;">
                            ${simBal > 100 ? 'Surplus ready for allocation' : 'Hold current balance for bills'}
                        </div>
                     </div>`;
        });
        cont.innerHTML = html;
    }

    // --- AUTH & SYNC ---
    async function hashPin(pin) {
        const msg = new TextEncoder().encode(pin + SALT);
        const buffer = await crypto.subtle.digest('SHA-256', msg);
        return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    window.pinKey = async k => {
        if(pinEntry.length >= 4) return;
        pinEntry += k;
        updateDots();
        if(pinEntry.length === 4) {
            const h = await hashPin(pinEntry);
            stateRef = ref(db, 'vault/' + h);
            const snap = await get(stateRef);
            if(snap.exists()) S = snap.val();
            else await set(stateRef, S);
            unlock();
        }
    };

    function unlock() {
        document.getElementById('pin-screen').classList.add('hidden');
        document.getElementById('main-nav').style.display = 'flex';
        document.getElementById('p-week').style.display = 'block';
        render();
        onValue(stateRef, (snap) => { if(snap.exists() && !saveTimer) { S = snap.val(); render(); } });
    }

    window.pinDel = () => { pinEntry = pinEntry.slice(0,-1); updateDots(); };
    function updateDots(err=false) {
        for(let i=0; i<4; i++) {
            const d = document.getElementById('pd'+i);
            d.className = 'pin-dot' + (i < pinEntry.length ? ' filled' : '') + (err ? ' error' : '');
        }
    }

    // --- UI HELPERS ---
    function render() {
        document.getElementById('v4496').textContent = "$" + S.bal4496.toLocaleString(undefined, {minimumFractionDigits:2});
        document.getElementById('v0725').textContent = "$" + S.bal0725.toLocaleString(undefined, {minimumFractionDigits:2});
        renderProjector();
    }

    window.saveData = () => {
        if(saveTimer) clearTimeout(saveTimer);
        document.getElementById('sync-dot').className = 'sync-dot spend';
        saveTimer = setTimeout(async () => {
            await set(stateRef, S);
            saveTimer = null;
            document.getElementById('sync-dot').className = 'sync-dot sok';
        }, 1000);
    };

    window.openEdit = (k, t) => {
        activeKey = k;
        document.getElementById('mtitle').textContent = t;
        document.getElementById('m-amt').value = S[k] || '';
        document.getElementById('mbg').classList.add('show');
        setTimeout(() => document.getElementById('m-amt').focus(), 100);
    };

    let activeKey = '';
    window.closeModal = () => document.getElementById('mbg').classList.remove('show');
    window.saveEdit = () => {
        const v = parseFloat(document.getElementById('m-amt').value);
        if(!isNaN(v)) { S[activeKey] = v; render(); saveData(); closeModal(); }
    };

    window.sw = (id, el) => {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
        document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
        document.getElementById('p-'+id).classList.add('on');
        el.classList.add('on');
    };
</script>
</body>
</html>
