<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111110">
<title>HF Tracker</title>
<style>
:root{
  --bg:#111110;--sf:#1c1c1a;--s2:#242422;--s3:#2e2e2c;--s4:#383836;
  --br:rgba(255,255,255,0.07);--br2:rgba(255,255,255,0.12);
  --tx:#f0efe9;--t2:#a8a69f;--t3:#5c5c58;--t4:#3a3a38;
  --red:#e8836e;--rbg:#2d1208;--rm:#8a3010;
  --amb:#d4922a;--abg:#281a00;--am:#7a5200;
  --grn:#7aad4e;--gbg:#0e1e06;--gm:#3a6818;
  --blu:#6b9fd4;--bbg:#071624;--bm:#1a4a7a;
  --pur:#9b82e8;--pbg:#160e2c;--pm:#4a2ea0;
  --r:12px;--rs:8px;--rx:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5;overflow-x:hidden;}

.overlay{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:40px 24px;}
.overlay.hidden{display:none;}
.pin-logo{font-size:40px;margin-bottom:10px;}
.pin-title{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.pin-sub{font-size:13px;color:var(--t3);margin-bottom:36px;}
.pin-dots{display:flex;gap:16px;margin-bottom:36px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--s4);border:1.5px solid var(--br2);transition:all .15s;}
.pin-dot.filled{background:var(--blu);border-color:var(--bm);}
.pin-dot.error{background:var(--red);border-color:var(--rm);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:264px;}
.pin-key{background:var(--s2);border:0.5px solid var(--br);border-radius:var(--r);padding:17px;font-size:22px;font-weight:600;color:var(--tx);cursor:pointer;text-align:center;transition:opacity .1s,transform .08s;user-select:none;}
.pin-key:active{opacity:.6;transform:scale(.94);}
.pin-key.del{font-size:17px;color:var(--t2);}
.pin-key.empty{background:transparent;border-color:transparent;pointer-events:none;}
.pin-error{font-size:12px;color:var(--red);margin-top:14px;height:16px;text-align:center;}
.spinner{width:28px;height:28px;border:2.5px solid var(--br2);border-top-color:var(--blu);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.nav{display:flex;background:var(--sf);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:100;overflow-x:auto;scrollbar-width:none;}
.nb{flex-shrink:0;padding:12px 14px;font-size:11px;font-weight:600;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;}
.nb.on{color:var(--blu);border-bottom-color:var(--blu);}

.panel{display:none;padding:10px 10px 90px;max-width:580px;margin:0 auto;}
.panel.on{display:block;}

.card{background:var(--sf);border-radius:var(--r);border:0.5px solid var(--br);padding:14px;margin-bottom:8px;}
.card-title{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}

.bstrip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;}
.bitem{background:var(--sf);border-radius:var(--rs);padding:8px 6px;border:0.5px solid var(--br);text-align:center;cursor:pointer;transition:opacity .15s;}
.bacct{font-size:9px;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;}
.bnum{font-size:16px;font-weight:700;margin-top:2px;letter-spacing:-.3px;}

.sync-row{font-size:10px;color:var(--t3);text-align:center;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:5px;}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sdok{background:var(--grn);}
.sderr{background:var(--red);}
.sdpend{background:var(--amb);}

.btn{display:block;width:100%;padding:12px;border-radius:var(--rs);border:none;font-size:14px;font-weight:700;cursor:pointer;text-align:center;margin-bottom:8px;transition:opacity .12s,transform .08s;letter-spacing:.01em;}
.btn:active{opacity:.7;transform:scale(.98);}
.btng{background:var(--gbg);color:var(--grn);border:1px solid var(--gm);}
.btnr{background:var(--rbg);color:var(--red);border:1px solid var(--rm);}
.btna{background:var(--abg);color:var(--amb);border:1px solid var(--am);}
.btnb{background:var(--bbg);color:var(--blu);border:1px solid var(--bm);}
.btno{background:var(--s2);color:var(--t2);border:0.5px solid var(--br);}

.ms{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--br);}
.ms-info{flex:1;}
.ms-label{font-size:13px;}
.ms-sub{font-size:11px;color:var(--t3);margin-top:1px;}
.ms-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

.cbox{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--br2);display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cbox.on{background:var(--gbg);border-color:var(--gm);}
.ck{font-size:11px;opacity:0;color:var(--grn);}
.cbox.on .ck{opacity:1;}

.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--s4);color:var(--tx);padding:9px 18px;border-radius:18px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;border:0.5px solid var(--br2);}
.toast.show{opacity:1;}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.mbg.open{display:flex;}
.mbox{background:var(--sf);border-radius:var(--rx) var(--rx) 0 0;padding:20px;width:100%;max-width:580px;padding-bottom:max(20px,env(safe-area-inset-bottom));}
.mtitle{font-size:17px;font-weight:700;margin-bottom:14px;}
.minput{width:100%;background:var(--s2);border:1px solid var(--br2);border-radius:var(--rs);padding:12px 14px;font-size:16px;color:var(--tx);margin-bottom:10px;outline:none;}

/* Reorder Button Styles */
.reorder-btns { display: flex; flex-direction: column; gap: 2px; margin-right: 12px; }
.reorder-btn { background: var(--s3); border: 0.5px solid var(--br2); color: var(--t2); border-radius: 4px; padding: 2px 6px; font-size: 10px; cursor: pointer; }
.reorder-btn:active { background: var(--s4); }
</style>
</head>
<body>

<div class="overlay" id="pin-screen">
  <div class="pin-logo">💰</div>
  <div class="pin-title">HF Tracker</div>
  <div class="pin-sub">Enter PIN to continue</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-grid">
    <div class="pin-key" onclick="pinKey('1')">1</div><div class="pin-key" onclick="pinKey('2')">2</div><div class="pin-key" onclick="pinKey('3')">3</div>
    <div class="pin-key" onclick="pinKey('4')">4</div><div class="pin-key" onclick="pinKey('5')">5</div><div class="pin-key" onclick="pinKey('6')">6</div>
    <div class="pin-key" onclick="pinKey('7')">7</div><div class="pin-key" onclick="pinKey('8')">8</div><div class="pin-key" onclick="pinKey('9')">9</div>
    <div class="pin-key empty"></div><div class="pin-key" onclick="pinKey('0')">0</div><div class="pin-key del" onclick="pinDel()">⌫</div>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<div class="overlay hidden" id="load-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--t3);margin-top:14px;">Initializing...</div>
</div>

<div class="toast" id="toast"></div>

<nav class="nav" style="display:none;" id="main-nav">
  <button class="nb on" id="nb-week" onclick="sw('week',this)">This Week</button>
  <button class="nb" id="nb-month" onclick="sw('month',this)">Month Plan</button>
  <button class="nb" id="nb-snowball" onclick="sw('snowball',this)">Roadmap</button>
</nav>

<div class="panel on" id="p-week" style="display:none;">
  <div class="bstrip">
    <div class="bitem" onclick="editBal('4496')"><div class="bacct">#4496</div><div class="bnum" id="b4496" style="color:var(--blu);">--</div></div>
    <div class="bitem" onclick="editBal('6764')"><div class="bacct">#6764</div><div class="bnum" id="b6764" style="color:var(--blu);">--</div></div>
    <div class="bitem" onclick="editBal('0725')"><div class="bacct">Savings</div><div class="bnum" id="b0725" style="color:var(--pur);">--</div></div>
  </div>
  <div class="sync-row">
    <span class="sync-dot sdpend" id="sync-dot"></span>
    <span id="sync-label">connecting...</span>
  </div>
  <div id="week-content"></div>
</div>

<div class="panel" id="p-month" style="display:none;">
  <div id="month-content"></div>
</div>

<div class="panel" id="p-snowball" style="display:none;">
  <div id="snowball-content"></div>
</div>

<div class="mbg" id="edit-modal" onclick="closeEdit(event)">
  <div class="mbox">
    <div class="mtitle" id="m-edit-title">Edit Balance</div>
    <input type="number" class="minput" id="m-edit-val" placeholder="0.00" inputmode="decimal">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <button class="btn btno" onclick="closeEdit()">Cancel</button>
      <button class="btn btnb" id="m-edit-btn">Save</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDsd7Pr0AEQ3j6n-bKXv7n06vYf9Hvew7Y",
  authDomain: "hf-tracker-81e76.firebaseapp.com",
  databaseURL: "https://hf-tracker-81e76-default-rtdb.firebaseio.com",
  projectId: "hf-tracker-81e76",
  storageBucket: "hf-tracker-81e76.firebasestorage.app",
  appId: "1:810272700127:web:f72c67e2a9d839a8049b6a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let SECRET = '';
let STATE = null;
let fbListener = null;

const TARGETS = [
  {id:'target_care', label:'Care Credit', startBal:2879, rate:0, min:0},
  {id:'target_cap1', label:'Capital One', startBal:2742, rate:0, min:0},
  {id:'target_wf',   label:'Wells Fargo', startBal:2661, rate:0, min:0}
];

// STATE MANAGEMENT
let S = {};
let saveTimer = null;
const now = new Date();
const mKey = `${now.getFullYear()}-${now.getMonth()}`;

function defaultState(){
  return {
    mKey,
    bal4496:0, bal6764:19, bal0725:654,
    karenLastPay:810, karenAvgPay:762,
    discSpent:0, discLog:[],
    weeks:[null,null,null,null],
    randySessions:[],
    billChecks:{},
    phaseDone:{},
    cardBals:{},
    snowballLog:[],
    confirmed:{},
    notified:{},
    // Milestones moved into State
    milestones: [
      {id:'jon-tires',  label:"Jon's tires + oil",   cost:1500},
      {id:'repair-buf', label:'Repair buffer (savings)',cost:1000,isSavings:true},
      {id:'karen-tires',label:"Karen's tires",          cost:1000},
      {id:'dental',     label:'Dental — Jon + Karen',  cost:500},
      {id:'glasses',    label:'Glasses — Jon + Karen', cost:1000},
    ]
  };
}

function resetMonthly(oldS){
  const n = defaultState();
  n.bal4496 = oldS.bal4496;
  n.bal6764 = oldS.bal6764;
  n.bal0725 = oldS.bal0725;
  n.cardBals = oldS.cardBals || {};
  // Preserve custom milestone order during monthly reset
  if(oldS.milestones) n.milestones = oldS.milestones;
  return n;
}

// HELPERS
function toast(m){
  const t=document.getElementById('toast'); t.textContent=m;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000);
}
function setSS(st){
  const d=document.getElementById('sync-dot');
  const l=document.getElementById('sync-label');
  d.className='sync-dot '+(st==='ok'?'sdok':st==='err'?'sderr':'sdpend');
  l.textContent=st==='ok'?'synced':st==='err'?'error':'saving...';
}
function bal(bals,id){ 
  const t=TARGETS.find(x=>x.id===id);
  return bals[id]!==undefined?bals[id]:t.startBal;
}

// NAVIGATION
window.sw = (id, el) => {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderAll();
};

// ACTIONS & DATABASE
function save(newState){
  S = newState;
  setSS('pend');
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    set(STATE, S).then(()=>{
      setSS('ok');
      saveTimer = null;
    }).catch(e=>{
      console.error(e);
      setSS('err');
    });
  }, 1000);
}

function loadFB(){
  document.getElementById('load-screen').classList.remove('hidden');
  if(fbListener) fbListener();
  fbListener = onValue(STATE, snap => {
    document.getElementById('load-screen').classList.add('hidden');
    if(!snap.exists()){
      save(defaultState());
      return;
    }
    const remote = snap.val();
    if(saveTimer){
      S.bal4496 = remote.bal4496;
      S.bal6764 = remote.bal6764;
      S.bal0725 = remote.bal0725;
    } else {
      S = {...defaultState(), ...remote};
      if(S.mKey !== mKey) S = resetMonthly(S);
    }
    document.getElementById('main-nav').style.display='flex';
    setSS('ok');
    renderAll();
  });
}

// REORDER LOGIC
window.moveMilestone = function(index, direction) {
  const newIndex = index + direction;
  if (newIndex < 0 || newIndex >= S.milestones.length) return;
  
  // Swap positions in array
  const temp = S.milestones[index];
  S.milestones[index] = S.milestones[newIndex];
  S.milestones[newIndex] = temp;
  
  save(S);
  renderSnowball();
  toast('Order updated');
};

// PIN LOGIC
let pinBuf = '';
window.pinKey = k => {
  if(pinBuf.length >= 4) return;
  pinBuf += k;
  updatePinDots();
  if(pinBuf.length === 4) setTimeout(checkPin, 150);
};
window.pinDel = () => { if(pinBuf.length>0){ pinBuf=pinBuf.slice(0,-1); updatePinDots(); }};

async function checkPin(){
  try {
    const snap = await get(ref(db, 'app_config'));
    const config = snap.val();
    const encoder = new TextEncoder();
    const data = encoder.encode(pinBuf);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hashHex === config.pinHash){
      SECRET = config.dataSecret;
      STATE = ref(db, `hft/${SECRET}/state`);
      document.getElementById('pin-screen').classList.add('hidden');
      loadFB();
    } else {
      pinBuf = '';
      updatePinDots(true);
      document.getElementById('pin-error').textContent = 'Incorrect PIN';
      setTimeout(()=>document.getElementById('pin-error').textContent='', 2000);
    }
  } catch(e) { console.error(e); }
}

function updatePinDots(err=false){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    d.className = 'pin-dot' + (i<pinBuf.length?' filled':'') + (err?' error':'');
  }
}

// RENDERERS
function renderAll(){
  document.getElementById('b4496').textContent = '$'+(S.bal4496||0).toLocaleString();
  document.getElementById('b6764').textContent = '$'+(S.bal6764||0).toLocaleString();
  document.getElementById('b0725').textContent = '$'+(S.bal0725||0).toLocaleString();
  
  if(document.getElementById('p-week').classList.contains('on')) renderWeek();
  if(document.getElementById('p-month').classList.contains('on')) renderMonth();
  if(document.getElementById('p-snowball').classList.contains('on')) renderSnowball();
}

function renderWeek(){
  const cont = document.getElementById('week-content');
  let html = `<div class="card"><div class="card-title">Daily Operations</div>
    <button class="btn btnb" onclick="logRandy()">Randy Session ($150)</button>
    <div style="font-size:11px;color:var(--t3);text-align:center;">Recent: ${S.randySessions?.length||0} sessions</div>
  </div>`;
  cont.innerHTML = html;
}

function renderMonth(){
  const cont = document.getElementById('month-content');
  const month = now.getMonth();
  const year = now.getFullYear();
  
  function getSmartNote(m, y) {
    const list = S.milestones || [];
    const currentGoalIndex = list.findIndex(p => !(S.phaseDone && S.phaseDone[p.id]));
    if (currentGoalIndex === -1) return '→ Surplus to snowball target';
    const p = list[currentGoalIndex];
    if (y < now.getFullYear() || (y === now.getFullYear() && m < now.getMonth())) return 'Paycheck';
    return `→ Saving for ${p.label} ($${p.cost.toLocaleString()})`;
  }
  
  const pcNote = getSmartNote(month, year);
  let html = `<div class="card"><div class="card-title">Current Goals</div>
    <div class="ms"><div class="ms-label">${pcNote}</div></div>
  </div>`;
  cont.innerHTML = html;
}

function renderSnowball(){
  const cont = document.getElementById('snowball-content');
  const list = S.milestones || [];
  let html = `<div class="card"><div class="card-title">Priority Roadmap</div>`;
  list.forEach((p, i) => {
    const isDone = S.phaseDone && S.phaseDone[p.id];
    html += `
      <div class="ms" style="${isDone ? 'opacity:0.4' : ''}">
        <div style="display:flex; align-items:center;">
          <div class="reorder-btns">
            <button class="reorder-btn" onclick="moveMilestone(${i},-1)">↑</button>
            <button class="reorder-btn" onclick="moveMilestone(${i},1)">↓</button>
          </div>
          <div class="ms-info">
            <div class="ms-label">${isDone ? '<s>' : ''}${p.label}${isDone ? '</s>' : ''}</div>
            <div class="ms-sub">$${p.cost.toLocaleString()} target</div>
          </div>
        </div>
        <div class="ms-right">
           <div class="cbox ${isDone ? 'on' : ''}" onclick="markPhaseDone('${p.id}')"><span class="ck">✓</span></div>
        </div>
      </div>`;
  });
  html += `</div>`;
  cont.innerHTML = html;
}

window.markPhaseDone = function(id){
  if(!S.phaseDone) S.phaseDone={};
  S.phaseDone[id] = !S.phaseDone[id];
  save(S); renderSnowball();
}

window.logRandy=function(){
  if(!S.randySessions)S.randySessions=[];
  S.randySessions.unshift({date:new Date().toLocaleDateString(),amt:150});
  save(S);renderAll();toast('Session logged — $150');
};

let editingId = '';
window.editBal = (id) => {
  editingId = id;
  const val = S['bal'+id] || 0;
  document.getElementById('m-edit-title').textContent = 'Edit Balance #'+id;
  document.getElementById('m-edit-val').value = val;
  document.getElementById('edit-modal').classList.add('open');
  document.getElementById('m-edit-val').focus();
  document.getElementById('m-edit-btn').onclick = () => {
    S['bal'+editingId] = parseFloat(document.getElementById('m-edit-val').value) || 0;
    save(S); renderAll(); closeEdit();
  };
};
window.closeEdit = (e) => {
  if(!e || e.target.id==='edit-modal' || e.target.className.includes('btno')){
    document.getElementById('edit-modal').classList.remove('open');
  }
};
</script>
</body>
</html>
