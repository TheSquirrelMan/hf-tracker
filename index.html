function mergeOrAddDiscLog(amt, date, label, cat) {
  S.discLog = S.discLog || [];
  const txParts  = date.split('/');
  const txMillis = new Date(parseInt(txParts[2]), parseInt(txParts[0])-1, parseInt(txParts[1])).getTime();
  const isCurrentMonth = txParts.length===3 && `${txParts[2]}-${parseInt(txParts[0])-1}` === mKey;
  const matchIdx = S.discLog.findIndex(e => {
    if(e.auto || e.confirmed) return false;
    const ep = (e.date||'').split('/');
    if(ep.length < 3) return false;
    const eMillis = new Date(parseInt(ep[2]),parseInt(ep[0])-1,parseInt(ep[1])).getTime();
    if(Math.abs(txMillis-eMillis)/86400000 > 2) return false;
    const el = (e.label||'').toUpperCase();
    const ml = label.toUpperCase();
    return el.includes(ml.split(' ')[0]) || ml.includes(el.split(' ')[0]);
  });
  if(matchIdx >= 0){
    const old = S.discLog[matchIdx];
    if(isCurrentMonth) S.discSpent = Math.max(0, (S.discSpent||0) - (old.amt||0));
    S.discLog[matchIdx] = {...old, amt, date, auto:true, confirmed:true};
    if(isCurrentMonth) S.discSpent = (S.discSpent||0) + amt;
  } else {
    S.discLog.unshift({amt, date, label, cat: cat||'discretionary', auto:true});
    if(isCurrentMonth && (!cat || cat==='discretionary')) S.discSpent = (S.discSpent||0) + amt;
  }
}

window.resolveDebit=function(idx,action){
  const log=S.debitLog||[];
  const d=log[idx];
  if(!d)return;

  if(action==='disc'){
    d.status='discretionary';
    mergeOrAddDiscLog(parseFloat(d.amt), d.date, d.merchant, 'discretionary');
  } else if(action==='link'){
    const sel=document.getElementById('link-bill-'+idx);
    if(!sel||!sel.value){toast('Pick a bill first');return;}
    d.status='matched';
    d.bill=sel.value;
    const bills=(S.userBills||[]);
    const bill=bills.find(b=>b.id===sel.value);
    if(bill&&!bill.keyword&&!bill.debitKeyword){
      bill.keyword=d.merchant;
      S.userBills=bills;
    }
  } else if(action==='newBill'){
    closeDebitModal();
    addBill();
    setTimeout(()=>{
      document.getElementById('bm-name').value=d.merchant;
      document.getElementById('bm-amt').value=d.amt;
      document.getElementById('bm-keyword').value=d.merchant;
    },160);
    return;
  } else if(action==='ignore'){
    d.status='ignored';
  }

  S.debitLog=log;
  save(S);
  renderDebitModal();
  renderWeek();
  renderSnowball();
};

// ══ ACTIONS ══
function addSpend(amt,label){
  const cat=document.getElementById('mi-category').value||'discretionary';
  if(cat==='discretionary')S.discSpent=(S.discSpent||0)+amt;
  (S.discLog=S.discLog||[]).unshift({amt,date:new Date().toLocaleDateString(),label,cat});
  save(S);renderWeek();toast(`-$${Math.round(amt)} logged`);
}
window.deleteSpend=function(i){
  const entry=S.discLog[i];
  if(!entry)return;
  if(!entry.cat||entry.cat==='discretionary')S.discSpent=Math.max(0,(S.discSpent||0)-entry.amt);
  S.discLog.splice(i,1);
  save(S);renderWeek();toast('Entry removed');
};
window.toggleSpendLog = function() {
  const body = document.getElementById('spendlog-body');
  const arrow = document.getElementById('spendlog-arrow');
  if (!body || !arrow) return;
  body.classList.toggle('open');
  arrow.classList.toggle('open');
};
window.resetDisc=function(){
  appConfirm('Reset discretionary log for this month?',()=>{
    S.discSpent=0;S.discLog=[];
    save(S);renderWeek();toast('Reset');
  });
};



window.dumpAll = function() {
  const data = calcRoadmap();
  const out = [];
  
  out.push('═══ 1:1 SITE DUMP (matches Month Plan exactly) ═══');
  out.push('');
  
  // ══ ACCOUNTS ══
  out.push('── Accounts ──');
  out.push(`  #4496 checking: $${S.bal4496}`);
  out.push(`  #6764 transitional: $${S.bal6764}`);
  out.push(`  #0725 savings: $${S.bal0725}`);
  out.push(`  Karen last pay: $${S.karenLastPay}`);
  out.push(`  Karen avg pay: $${S.karenAvgPay || S.karenLastPay || 810}`);
  out.push(`  Jon last pay: $${S.jonLastPay || 1641}`);
  out.push(`  Jon avg pay: $${S.jonAvgPay || S.jonLastPay || 1641}`);
  out.push('');
  
  // ══ PHASES ══
  out.push('── Phases (in order) ──');
  getPhases().forEach((p, i) => {
    const done = (S.phaseDone || {})[p.id];
    const cost = (S.phaseCosts && S.phaseCosts[p.id]) || p.cost;
    const m = data.milestones[p.id];
    const savingsLabel = p.monthlySave ? ` · 💰 $${p.monthlySave}/mo` : p.percentOfPay ? ` · 💰 ${p.percentOfPay}% of pay` : '';
    out.push(`  ${i+1}. ${p.label}: $${cost}${savingsLabel} | ${done ? '✓ DONE' : m ? m.date : 'calculating...'}`);
  });
  out.push('');
  
  // ══ ALL BILLS ══
  out.push('── All Bills (userBills) ──');
  const bills = S.userBills || [];
  bills.forEach((b, i) => {
    const type = b.endDate ? 'FIXED' : 'RECURRING';
    const dayStr = Array.isArray(b.day) ? b.day.join(',') : b.day;
    out.push(`  ${i+1}. [${type}] ${b.name}: $${b.amt} | day ${dayStr} | freq: ${b.frequency || 'monthly'} | cardId: ${b.cardId || 'none'} | endDate: ${b.endDate || 'none'} | conditionEnd: ${b.conditionEnd || 'none'} | keyword: ${b.keyword || b.debitKeyword || 'none'} | monthly: $${Math.round(toMonthlyAmt(b))}`);
  });
  out.push('');
  
  // ══ SNOWBALL TARGETS ══
  out.push('── Snowball Targets (in order) ──');
  const targets = getSnowballTargets();
  targets.forEach((t, i) => {
    const balAmt = bal(S.cardBals || {}, t.id);
    const done = data.milestones[t.id + '-done'];
    out.push(`  ${i+1}. ${t.label}: $${balAmt.toLocaleString()} owed | $${t.minPay}/mo min | ${done ? 'PAID OFF ' + done.date : 'active'}`);
  });
  out.push('');
  
  // ══ CARD BALANCES ══
  out.push('── Card Balances ──');
  const cb = S.cardBals || {};
  const startBals = S.cardStartBals || {};
  const allCardIds = [...new Set([...Object.keys(startBals), ...Object.keys(cb)])];
  if (allCardIds.length === 0) {
    out.push('  No card balances — run seedCardStartBals() in Apps Script');
  } else {
    allCardIds.forEach(id => {
      const actual = cb[id];
      const fallback = startBals[id] || 0;
      out.push(`  ${id}: $${actual !== undefined ? actual : fallback}${actual !== undefined ? '' : ' (start)'}`);
    });
  }
  out.push('');
  
  // ══ MILESTONES ══
  out.push('── All Milestones ──');
  Object.entries(data.milestones).forEach(([key, val]) => {
    out.push(`  ${key}: ${val.date || val} ${val.bal ? '($' + val.bal.toLocaleString() + ')' : ''}`);
  });
  out.push('');
  
  // ══ MONTH-BY-MONTH (runs EXACT same functions as Month Plan tab) ══
  out.push('═══ MONTH-BY-MONTH (matches Month Plan tab exactly) ═══');
  out.push('');
  
  const startMonth = now.getMonth();
  const startYear = now.getFullYear();
  
  for (let m = 0; m < 12; m++) {
    const month = (startMonth + m) % 12;
    const year = startYear + Math.floor((startMonth + m) / 12);
    
    // These are the EXACT same functions the Month Plan tab calls
    const evts = getMonthEvents(year, month, data.milestones, data.balLog, data.sinkingLog);
    const startDay = (year === 2026 && month === 3) ? 22 : 1;
    
    const totalIn = evts.filter(e => e.isIncome && e.day >= startDay).reduce((a, e) => a + (e.amt || 0), 0);
    const totalOut = evts.filter(e => !e.isIncome && e.day >= startDay && e.amt < 0).reduce((a, e) => a + Math.abs(e.amt), 0);
    const discDed = evts.filter(e => e.label === 'Discretionary' && e.day >= startDay).reduce((a, e) => a + Math.abs(e.amt), 0);
    
    // Get starting balance from balLog
    let startBal = null;
    const firstDay = new Date(year, month, startDay);
    for (let d = new Date(firstDay); d >= new Date(now.getFullYear(), now.getMonth(), now.getDate()); d.setDate(d.getDate() - 1)) {
      const k = d.toISOString().split('T')[0];
      if (data.balLog[k] !== undefined) { startBal = data.balLog[k]; break; }
    }
    if (startBal === null) startBal = S.bal4496;
    
    out.push(`── ${MN[month]} ${year} ──`);
    out.push(`  Starting balance: $${startBal.toLocaleString()}`);
    out.push(`  Income: +$${Math.round(totalIn).toLocaleString()}`);
    out.push(`  Bills + spending: -$${Math.round(totalOut).toLocaleString()}`);
    out.push(`  Discretionary: -$${Math.round(discDed).toLocaleString()} / $${(S.discMonthlyCap||200).toLocaleString()} cap`);
    out.push(`  Net: ${totalIn - totalOut >= 0 ? '+' : '-'}$${Math.round(Math.abs(totalIn - totalOut)).toLocaleString()}`);
    
    // Sinking fund summary for this month
    const monthKey=`${year}-${String(month+1).padStart(2,'0')}`;
    const sfPhases=getPhases().filter(p=>(p.monthlySave||p.percentOfPay)&&!(S.phaseDone||{})[p.id]&&(!data.milestones[p.id]||data.milestones[p.id].date>=monthKey));
    sfPhases.forEach(sfPhase=>{
      const doneDate=data.milestones[sfPhase.id]?.date;
      const doneLabel=doneDate&&doneDate.substring(0,7)===monthKey?` · completed ${doneDate}`:'';
      const sfLabel=sfPhase.monthlySave?`$${sfPhase.monthlySave}/mo`:`${sfPhase.percentOfPay}% of pay`;
      out.push(`  💰 Sinking: ${sfLabel} → ${sfPhase.label} ($${phaseAmt(sfPhase.id,sfPhase.cost).toLocaleString()})${doneLabel}`);
    });
    
    // Show key events by week
    const byDay = {};
    evts.forEach(e => { if (e.day >= startDay) { if (!byDay[e.day]) byDay[e.day] = []; byDay[e.day].push(e); } });
    const sortedDays = Object.keys(byDay).map(Number).sort((a, b) => a - b);
    let wdays = [], weeks = [];
    sortedDays.forEach((day, i) => {
      wdays.push(day);
      if (new Date(year, month, day).getDay() === 6 || i === sortedDays.length - 1) { weeks.push([...wdays]); wdays = []; }
    });
    
    weeks.forEach(wds => {
      const wStart = wds[0], wEnd = wds[wds.length - 1];
      const allW = wds.flatMap(d => byDay[d] || []);
      const wIn = allW.filter(e => e.isIncome).reduce((a, e) => a + (e.amt || 0), 0);
      const wOut = allW.filter(e => !e.isIncome && e.amt < 0).reduce((a, e) => a + Math.abs(e.amt), 0);
      
      // Only show weeks with significant events
      const hasSnowball = allW.some(e => e.feat && e.title.includes('CLEARED'));
      const hasPhase = allW.some(e => e.feat && !e.title.includes('CLEARED') && !e.title.startsWith('Pay'));
      const label = hasSnowball ? ' 🎉' : hasPhase ? ' 💾' : '';
      out.push(`  ${MN[month].substring(0,3)} ${wStart}–${wEnd}:${label} +$${Math.round(wIn).toLocaleString()} / -$${Math.round(wOut).toLocaleString()}`);
      
      // Show significant events
      wds.forEach(day => {
        (byDay[day] || []).forEach(e => {
          if (e.feat || Math.abs(e.amt) > 200) {
            const prefix = e.isIncome ? '+' : '-';
            out.push(`    ${String(day).padStart(2)} ${e.title}: ${prefix}$${Math.round(Math.abs(e.amt)).toLocaleString()}`);
          }
        });
      });
    });
    out.push('');
  }
  
  // ══ SUMMARY ══
  out.push('── Summary ──');
  const fixedBillsSum = bills.filter(b => b.cardId || b.endDate).reduce((sum, b) => sum + toMonthlyAmt(b), 0);
  const recurBillsSum = bills.filter(b => !b.cardId && !b.endDate).reduce((sum, b) => sum + toMonthlyAmt(b), 0);
  const monthlyBills = fixedBillsSum + recurBillsSum;
  const monthlyIncome = Math.round((S.karenAvgPay || S.karenLastPay || 810) * 4.33) + (S.jonLastPay || 1641) * 2;
  const dumpDiscCap = S.discMonthlyCap || 200;
  const dumpSinkingMo = getPhases().reduce((sum, p) => {
    if ((S.phaseDone || {})[p.id]) return sum;
    if (p.monthlySave) return sum + p.monthlySave;
    if (p.savingsMode === 'percent' && p.percentOfPay) return sum + Math.round(monthlyIncome * p.percentOfPay / 100);
    return sum;
  }, 0);
  out.push(`  Monthly income: $${Math.round(monthlyIncome).toLocaleString()}`);
  out.push(`  Fixed-term bills: $${Math.round(fixedBillsSum).toLocaleString()}/mo`);
  out.push(`  Recurring bills: $${Math.round(recurBillsSum).toLocaleString()}/mo`);
  out.push(`  Total bills (raw): $${Math.round(monthlyBills).toLocaleString()}/mo`);
  out.push(`  Discretionary cap: $${dumpDiscCap}`);
  if (dumpSinkingMo > 0) out.push(`  Sinking fund: $${dumpSinkingMo}/mo`);
  out.push(`  ─────────────────────`);
  const roadmapTotal = monthlyBills + dumpDiscCap + dumpSinkingMo;
  out.push(`  Roadmap total: $${Math.round(roadmapTotal).toLocaleString()}/mo (bills + disc${dumpSinkingMo>0?' + sinking':''})`);
  out.push(`  Net surplus: $${Math.round(monthlyIncome - roadmapTotal).toLocaleString()}`);
  const weeklyBills = bills.filter(b => b.frequency === 'weekly');
  if (weeklyBills.length > 0) {
    out.push(`  ⚠ Weekly-frequency bills (amt × 4.33):`);
    weeklyBills.forEach(b => out.push(`    - ${b.name}: $${b.amt}/wk → $${Math.round(b.amt * 4.33)}/mo`));
  }
  out.push(`  Total debt: $${targets.reduce((s, t) => s + bal(S.cardBals || {}, t.id), 0).toLocaleString()}`);
  out.push(`  Debt-free date: ${data.milestones['debt-free'] ? data.milestones['debt-free'].date : 'unknown'}`);
  out.push('');
  out.push('═══ END 1:1 DUMP ═══');
  
  const text = out.join('\n');
  console.log(text);
  
  const btn = document.createElement('button');
  btn.textContent = '📋 Click to copy full dump';
  btn.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;padding:20px 30px;background:#242422;color:#f0efe9;border:1px solid #7aad4e;border-radius:12px;font-size:16px;cursor:pointer;font-family:sans-serif;';
  btn.onclick = async () => {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.remove(), 2000);
  };
  document.body.appendChild(btn);
  
  return text;
};

// ══ PHASE MANAGEMENT ══
let editingPhaseId = null;

window.addPhase = function() {
  editingPhaseId = null;
  const modal = document.getElementById('phase-modal');
  document.getElementById('pm-title').textContent = 'Add milestone';
  document.getElementById('pm-label').value = '';
  document.getElementById('pm-cost').value = '';
  document.getElementById('pm-target').value = '';
  document.getElementById('pm-monthly').value = '';
  document.getElementById('pm-percent').value = '';
  document.getElementById('pm-percent').style.display = 'none';
  document.getElementById('pm-monthly').style.display = '';
  document.querySelector('input[name="savings-mode"][value="fixed"]').checked = true;
  document.getElementById('pm-savings').checked = false;
  document.getElementById('pm-delete-btn').style.display = 'none';
  modal.classList.add('open');
  setTimeout(() => document.getElementById('pm-label').focus(), 140);
};

window.editPhase = function(id) {
  const phasesList = getPhases();
  const phase = phasesList.find(p => p.id === id);
  if (!phase) return;
  editingPhaseId = id;
  const modal = document.getElementById('phase-modal');
  document.getElementById('pm-title').textContent = 'Edit milestone';
  document.getElementById('pm-label').value = phase.label;
  document.getElementById('pm-cost').value = phaseAmt(id, phase.cost);
  document.getElementById('pm-target').value = phase.targetDate || '';
  if (phase.savingsMode === 'percent' && phase.percentOfPay) {
    document.querySelector('input[name="savings-mode"][value="percent"]').checked = true;
    document.getElementById('pm-monthly').style.display = 'none';
    document.getElementById('pm-percent').style.display = '';
    document.getElementById('pm-percent').value = phase.percentOfPay;
    document.getElementById('pm-monthly').value = '';
  } else {
    document.querySelector('input[name="savings-mode"][value="fixed"]').checked = true;
    document.getElementById('pm-monthly').style.display = '';
    document.getElementById('pm-percent').style.display = 'none';
    document.getElementById('pm-monthly').value = phase.monthlySave || '';
    document.getElementById('pm-percent').value = '';
  }
  document.getElementById('pm-savings').checked = phase.isSavings || false;
  document.getElementById('pm-delete-btn').style.display = '';
  modal.classList.add('open');
  setTimeout(() => document.getElementById('pm-label').focus(), 140);
};

window.savePhaseModal = function() {
  const label = document.getElementById('pm-label').value.trim();
  const cost = parseFloat(document.getElementById('pm-cost').value);
  const isSavings = document.getElementById('pm-savings').checked;
  const targetDate = document.getElementById('pm-target').value.trim() || null;
  const savingsMode = document.querySelector('input[name="savings-mode"]:checked')?.value || null;
  const percentOfPay = savingsMode === 'percent' ? (parseFloat(document.getElementById('pm-percent').value) || null) : null;
  const monthlySave = savingsMode === 'fixed' ? (parseFloat(document.getElementById('pm-monthly').value) || null) : null;
  
  if (!label || isNaN(cost) || cost <= 0) {
    toast('Fill in all fields');
    return;
  }
  
  if (editingPhaseId) {
    const phasesList = [...getPhases()];
    const idx = phasesList.findIndex(p => p.id === editingPhaseId);
    if (idx >= 0) {
      phasesList[idx] = { ...phasesList[idx], label, cost, isSavings, targetDate, savingsMode, percentOfPay, monthlySave };
      if (savingsMode === 'fixed') delete phasesList[idx].percentOfPay;
      if (savingsMode === 'percent') delete phasesList[idx].monthlySave;
      S.phases = phasesList;
      if (S.phaseCosts) S.phaseCosts[editingPhaseId] = cost;
      editingPhaseId = null;
      _cachedRoadmap = null;
      save(S);
      closePhaseModal();
      renderAll();
      toast('Milestone updated');
    }
    return;
  }
  
  const phasesList = [...getPhases()];
  const newPhase = {
    id: 'phase_' + Date.now(),
    label: label,
    cost: cost,
    isSavings: isSavings,
    targetDate: targetDate,
    savingsMode: savingsMode,
    monthlySave: monthlySave,
    percentOfPay: percentOfPay
  };
  
  phasesList.push(newPhase);
  S.phases = phasesList;
  _cachedRoadmap = null;
  save(S);
  closePhaseModal();
  renderAll();
  toast('Milestone added');
};

window.deletePhase = function(id) {
  const phasesList = getPhases();
  const phase = phasesList.find(p => p.id === id);
  if (!phase) return;
  appConfirm(`Delete "${phase.label}"?`,()=>{
    S.phases = phasesList.filter(p => p.id !== id);
    if (S.phaseDone && S.phaseDone[id]) delete S.phaseDone[id];
    _cachedRoadmap = null;
    if(saveTimer)clearTimeout(saveTimer);
    setSS('pend');
    saveTimer=setTimeout(async()=>{try{await set(STATE,S);setSS('ok');}catch(e){console.warn('save fail',e);setSS('err');}},10);
    renderAll();
    toast('Milestone deleted');
  });
};

window.closePhaseModal = () => document.getElementById('phase-modal').classList.remove('open');

window.toggleSavingsMode = function() {
  const mode = document.querySelector('input[name="savings-mode"]:checked')?.value;
  document.getElementById('pm-monthly').style.display = mode === 'fixed' ? '' : 'none';
  document.getElementById('pm-percent').style.display = mode === 'percent' ? '' : 'none';
};

window.autoSuggestMonthly = function() {
  const cost = parseFloat(document.getElementById('pm-cost').value);
  const target = document.getElementById('pm-target').value.trim();
  if (!target || isNaN(cost) || cost <= 0) return;
  const targetDate = new Date(target + 'T12:00:00');
  if (isNaN(targetDate.getTime())) return;
  const nowDate = new Date();
  const months = (targetDate.getFullYear() - nowDate.getFullYear()) * 12 + (targetDate.getMonth() - nowDate.getMonth());
  if (months > 0) {
    const mode = document.querySelector('input[name="savings-mode"]:checked')?.value;
    if (mode === 'percent') {
      const jonAmt = Math.round(S.jonAvgPay || S.jonLastPay || 1641);
      const karenAmt = Math.round(S.karenAvgPay || S.karenLastPay || 810);
      const monthlyInc = jonAmt * 2 + Math.round(karenAmt * 4.33);
      document.getElementById('pm-percent').value = Math.round(cost / months / monthlyInc * 100);
    } else {
      document.getElementById('pm-monthly').value = Math.round(cost / months);
    }
  }
};

window.deletePhaseModal = function() {
  if (!editingPhaseId) return;
  closePhaseModal();
  deletePhase(editingPhaseId);
};

window.movePhase = function(index, direction) {
  const phasesList = [...getPhases()];
  const newIndex = index + direction;
  
  if (newIndex < 0 || newIndex >= phasesList.length) return;
  
  const temp = phasesList[index];
  phasesList[index] = phasesList[newIndex];
  phasesList[newIndex] = temp;
  
  S.phases = phasesList;
  _cachedRoadmap = null;
  save(S);
  renderAll();
  toast('Phases reordered');
};

window.moveFixedBill=function(id,dir){
  const bills=[...(S.userBills||[])];
  const fixed=bills.filter(b=>b.endDate);
  const idx=fixed.findIndex(b=>b.id===id);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=fixed.length)return;
  const aIdx=bills.findIndex(b=>b.id===fixed[idx].id);
  const bIdx=bills.findIndex(b=>b.id===fixed[newIdx].id);
  [bills[aIdx],bills[bIdx]]=[bills[bIdx],bills[aIdx]];
  S.userBills=bills;
  _cachedRoadmap = null;
  save(S);
  renderSnowball();
  toast('Reordered');
};

window.saveDiscSettings = function() {
  const cap = parseInt(document.getElementById('disc-cap').value);
  if (isNaN(cap) || cap < 0) {
    toast('Enter a valid amount');
    return;
  }
  S.discMonthlyCap = cap;
  S.discWeekly = Math.round(cap / 4);
  _cachedRoadmap = null;
  save(S);
  renderAll();
  toast(`Discretionary: $${cap}/mo`);
};

window.markPhaseDone=function(id){
  if(!S.phaseDone)S.phaseDone={};
  S.phaseDone[id]=true;
  _cachedRoadmap = null;
  if(id==='repair-buf'){
    S.bal0725=(S.bal0725||0)+1000;
    S.bal4496=Math.max(0,(S.bal4496||0)-1000);
    toast('$1,000 moved to savings ✓');
  }
  save(S);renderAll();toast('Phase complete ✓');
};
window.confirmAction=function(id){
  if(!S.confirmed)S.confirmed={};
  S.confirmed[id]=true;
  save(S);
  renderWeek();
  toast('✓');
};

// ══ DEBUG EXPORTS ══
window.getDailyBills=getDailyBills;
window.calcRoadmap=()=>calcRoadmap();
window.getS=()=>S;
Object.defineProperty(window,'_S',{get:()=>S});
window.getPhases=()=>getPhases();
window.getSnowballTargets=()=>getSnowballTargets();
window.resetPhases=()=>{
  S.phases = JSON.parse(JSON.stringify(DEFAULT_PHASES));
  _cachedRoadmap = null;
  save(S);
  renderAll();
  toast('Phases reset to default order');
};
window.resetBills=()=>{
  S.userBills = JSON.parse(JSON.stringify(DEFAULT_USER_BILLS));
  _cachedRoadmap = null;
  save(S);
  renderAll();
  toast('Bills reset to defaults');
};

// ══ INIT ══
checkAuth();
