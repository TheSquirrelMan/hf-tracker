<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a18">
    <title>HF Vault Full</title>
    <style>
        :root {
            --bg:#1a1a18; --sf:#252523; --s2:#2c2c2a; --s3:#343432;
            --br:rgba(255,255,255,0.08);
            --tx:#f0efe9; --t2:#b4b2a9; --t3:#666660;
            --red:#F09595; --rbg:#3d1515; --rm:#A32D2D;
            --amb:#EF9F27; --abg:#3d2800; --am:#854F0B;
            --grn:#97C459; --gbg:#1a2e08; --gm:#3B6D11;
            --blu:#85B7EB; --bbg:#0c2240; --bm:#185FA5;
            --pur:#C4B5FD; --pbg:#1e1a3d; --pm:#5B4FBF;
            --r:14px; --rs:8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--tx); font-size: 14px; line-height: 1.4; height: 100vh; overflow: hidden; }
        
        /* PIN */
        .pin-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-screen.hidden { display: none; }
        .pin-dots { display: flex; gap: 14px; margin-bottom: 32px; }
        .pin-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--s3); border: 1px solid var(--br); }
        .pin-dot.filled { background: var(--blu); }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .pin-key { background: var(--sf); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 600; cursor: pointer; border: 1px solid var(--br); }

        /* Layout */
        .nav { display: flex; background: var(--sf); border-bottom: 1px solid var(--br); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .nav::-webkit-scrollbar { display: none; }
        .nb { flex: 0 0 auto; padding: 16px 20px; font-size: 11px; font-weight: 700; color: var(--t3); border: none; background: none; text-transform: uppercase; letter-spacing: 1px; }
        .nb.on { color: var(--blu); border-bottom: 2px solid var(--blu); }
        
        .panel { display: none; padding: 12px; height: calc(100vh - 50px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .panel.on { display: block; }
        
        .card { background: var(--sf); border-radius: var(--r); padding: 12px; margin-bottom: 10px; border: 1px solid var(--br); }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--br); }
        .row:last-child { border: none; }
        
        .bal { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
        .lbl { font-size: 11px; color: var(--t3); text-transform: uppercase; font-weight: 600; }
        
        .btn { padding: 12px; border-radius: var(--rs); border: none; font-weight: 700; cursor: pointer; text-align: center; }
        .btno { background: var(--s2); color: var(--t2); border: 1px solid var(--br); }

        /* Modals */
        .mbg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .mbg.show { display: flex; }
        .modal { background: var(--sf); border-radius: var(--r); padding: 20px; width: 100%; max-width: 400px; border: 1px solid var(--br); }
        input { width: 100%; background: var(--s2); border: 1px solid var(--br); padding: 12px; color: var(--tx); border-radius: var(--rs); font-size: 16px; margin: 12px 0; }
    </style>
</head>
<body>

<div class="pin-screen" id="pin-screen">
    <div style="font-size:24px; font-weight:700; margin-bottom:20px;">HF VAULT</div>
    <div class="pin-dots" id="pin-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-grid">
        <div class="pin-key" onclick="pk('1')">1</div><div class="pin-key" onclick="pk('2')">2</div><div class="pin-key" onclick="pk('3')">3</div>
        <div class="pin-key" onclick="pk('4')">4</div><div class="pin-key" onclick="pk('5')">5</div><div class="pin-key" onclick="pk('6')">6</div>
        <div class="pin-key" onclick="pk('7')">7</div><div class="pin-key" onclick="pk('8')">8</div><div class="pin-key" onclick="pk('9')">9</div>
        <div class="pin-key" style="visibility:hidden"></div><div class="pin-key" onclick="pk('0')">0</div><div class="pin-key" onclick="pd()">⌫</div>
    </div>
</div>

<nav class="nav" id="main-nav" style="display:none;">
    <button class="nb on" onclick="sw('proj',this)">Projector</button>
    <button class="nb" onclick="sw('snow',this)">Snowball</button>
    <button class="nb" onclick="sw('manu',this)">Manual</button>
</nav>

<div class="panel on" id="p-proj" style="display:none;">
    <div class="card" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div class="btn btno" onclick="ed('bal4496', '#4496')">#4496: <span id="v4496">--</span></div>
        <div class="btn btno" onclick="ed('bal0725', 'Savings')">#0725: <span id="v0725">--</span></div>
    </div>
    <div id="projector-list"></div>
</div>

<div class="panel" id="p-snow" style="display:none;">
    <div id="snowball-list"></div>
</div>

<div class="panel" id="p-manu" style="display:none;">
    <div class="card">
        <div class="lbl">Total Monthly Overhead</div>
        <div class="bal" id="overhead-val">$0.00</div>
    </div>
    <div id="manual-list"></div>
</div>

<div class="mbg" id="mbg">
    <div class="modal">
        <div id="mtitle" class="lbl"></div>
        <input type="number" id="m-amt" step="0.01" inputmode="decimal">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="btn" style="background:var(--gbg); color:var(--grn);" onclick="se()">Update</button>
            <button class="btn btno" onclick="cl()">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, onValue, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDsd7Pr0AEQ3j6n-bKXv7n06vYf9Hvew7Y",
        authDomain: "hf-tracker-81e76.firebaseapp.com",
        databaseURL: "https://hf-tracker-81e76-default-rtdb.firebaseio.com",
        projectId: "hf-tracker-81e76",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let sRef = null;
    let S = { bal4496: 0, bal0725: 0 };
    let pin = '';
    const SALT = "hf_running_2026";

    // --- RECOVERED LOGIC ---
    const EXPENSES = [
        { n: "Rent", a: 1200, d: 1 },
        { n: "TN Unemployment", a: 50, d: 5 },
        { n: "Merrick Min", a: 55, d: 12 },
        { n: "Utilities", a: 160, d: 15 },
        { n: "IRS 2024", a: 100, d: 15 },
        { n: "Amazon Min", a: 40, d: 20 },
        { n: "Insurance", a: 110, d: 22 }
    ];

    // --- AUTH ---
    window.pk = async k => {
        if(pin.length >= 4) return;
        pin += k;
        updDots();
        if(pin.length === 4) {
            const h = await hash(pin + SALT);
            sRef = ref(db, 'vault/' + h);
            const snap = await get(sRef);
            if(snap.exists()) S = snap.val();
            else await set(sRef, S);
            document.getElementById('pin-screen').classList.add('hidden');
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('p-proj').style.display = 'block';
            onValue(sRef, snap => { if(snap.exists()) { S = snap.val(); ren(); }});
        }
    };
    window.pd = () => { pin = pin.slice(0,-1); updDots(); };
    function updDots() {
        const ds = document.getElementById('pin-dots').children;
        for(let i=0; i<4; i++) ds[i].classList.toggle('filled', i < pin.length);
    }
    async function hash(m) {
        const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(m));
        return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, '0')).join('');
    }

    // --- RENDER ENGINE ---
    function ren() {
        document.getElementById('v4496').textContent = "$" + S.bal4496.toLocaleString();
        document.getElementById('v0725').textContent = "$" + S.bal0725.toLocaleString();
        
        // 1. Projector (Running Balance)
        let cur = S.bal4496;
        let html = '';
        let today = new Date();
        
        for(let i=0; i<32; i++) {
            let d = new Date(); d.setDate(today.getDate() + i);
            let dayNum = d.getDate();
            let dayBills = EXPENSES.filter(e => e.d === dayNum);
            
            dayBills.forEach(b => cur -= b.a);
            
            let color = cur < 200 ? 'var(--red)' : (cur < 500 ? 'var(--amb)' : 'var(--tx)');
            
            html += `<div class="row">
                <div style="font-size:11px; color:var(--t3)">${d.toLocaleDateString(undefined, {month:'short', day:'numeric'})}</div>
                <div style="flex:1; padding:0 10px; font-weight:600;">${dayBills.length ? dayBills[0].n : ''}</div>
                <div class="bal" style="color:${color}">$${cur.toLocaleString()}</div>
            </div>`;
        }
        document.getElementById('projector-list').innerHTML = `<div class="card">${html}</div>`;

        // 2. Manual Tab (Calculated Overhead)
        let totalOverhead = EXPENSES.reduce((sum, e) => sum + e.a, 0);
        document.getElementById('overhead-val').textContent = "$" + totalOverhead.toLocaleString();
        let mHtml = EXPENSES.map(e => `<div class="row"><span>${e.n}</span><span class="bal">$${e.a}</span></div>`).join('');
        document.getElementById('manual-list').innerHTML = `<div class="card">${mHtml}</div>`;
    }

    // --- UTILS ---
    window.sw = (id, el) => {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
        document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
        document.getElementById('p-'+id).classList.add('on');
        el.classList.add('on');
    };
    let ak = '';
    window.ed = (k, t) => { ak = k; document.getElementById('mtitle').textContent = t; document.getElementById('m-amt').value = S[k]; document.getElementById('mbg').classList.add('show'); };
    window.cl = () => document.getElementById('mbg').classList.remove('show');
    window.se = async () => {
        const v = parseFloat(document.getElementById('m-amt').value);
        if(!isNaN(v)) { S[ak] = v; await set(sRef, S); ren(); cl(); }
    };
</script>
</body>
</html>
