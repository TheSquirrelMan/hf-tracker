<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111110">
<title>HF Tracker</title>
<style>
:root{
  --bg:#111110;--sf:#1c1c1a;--s2:#242422;--s3:#2e2e2c;--s4:#383836;
  --br:rgba(255,255,255,0.07);--br2:rgba(255,255,255,0.12);
  --tx:#f0efe9;--t2:#a8a69f;--t3:#5c5c58;--t4:#3a3a38;
  --red:#e8836e;--rbg:#2d1208;--rm:#8a3010;
  --amb:#d4922a;--abg:#281a00;--am:#7a5200;
  --grn:#7aad4e;--gbg:#0e1e06;--gm:#3a6818;
  --blu:#6b9fd4;--bbg:#071624;--bm:#1a4a7a;
  --pur:#9b82e8;--pbg:#160e2c;--pm:#4a2ea0;
  --r:12px;--rs:8px;--rx:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5;overflow-x:hidden;}

.overlay{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:40px 24px;}
.overlay.hidden{display:none;}
.pin-logo{font-size:40px;margin-bottom:10px;}
.pin-title{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px;}
.pin-sub{font-size:13px;color:var(--t3);margin-bottom:36px;}
.pin-dots{display:flex;gap:16px;margin-bottom:36px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--s4);border:1.5px solid var(--br2);transition:all .15s;}
.pin-dot.filled{background:var(--blu);border-color:var(--bm);}
.pin-dot.error{background:var(--red);border-color:var(--rm);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:264px;}
.pin-key{background:var(--s2);border:0.5px solid var(--br);border-radius:var(--r);padding:17px;font-size:22px;font-weight:600;color:var(--tx);cursor:pointer;text-align:center;transition:opacity .1s,transform .08s;user-select:none;}
.pin-key:active{opacity:.6;transform:scale(.94);}
.pin-key.del{font-size:17px;color:var(--t2);}
.pin-key.empty{background:transparent;border-color:transparent;pointer-events:none;}
.pin-error{font-size:12px;color:var(--red);margin-top:14px;height:16px;text-align:center;}
.spinner{width:28px;height:28px;border:2.5px solid var(--br2);border-top-color:var(--blu);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.nav{display:flex;justify-content:center;background:var(--sf);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:100;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;padding:12px 14px;font-size:11px;font-weight:600;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;}
.nb.on{color:var(--blu);border-bottom-color:var(--blu);}

.panel{display:none;padding:10px 10px 90px;max-width:580px;margin:0 auto;}
.panel.on{display:block;}

.card{background:var(--sf);border-radius:var(--r);border:0.5px solid var(--br);padding:14px;margin-bottom:8px;}
.card-title{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}

.bstrip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;}
.bitem{background:var(--sf);border-radius:var(--rs);padding:8px 6px;border:0.5px solid var(--br);text-align:center;cursor:pointer;transition:opacity .15s;}
.bitem:active{opacity:.6;}
.bacct{font-size:9px;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;}
.bnum{font-size:16px;font-weight:700;margin-top:2px;letter-spacing:-.3px;}
.sync-row{font-size:10px;color:var(--t3);text-align:center;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:5px;}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sdok{background:var(--grn);}
.sderr{background:var(--red);}
.sdpend{background:var(--amb);}

.btn{display:block;width:100%;padding:12px;border-radius:var(--rs);border:none;font-size:14px;font-weight:700;cursor:pointer;text-align:center;margin-bottom:8px;transition:opacity .12s,transform .08s;letter-spacing:.01em;}
.btn:active{opacity:.7;transform:scale(.98);}
.btng{background:var(--gbg);color:var(--grn);border:1px solid var(--gm);}
.btnr{background:var(--rbg);color:var(--red);border:1px solid var(--rm);}
.btna{background:var(--abg);color:var(--amb);border:1px solid var(--am);}
.btnb{background:var(--bbg);color:var(--blu);border:1px solid var(--bm);}
.btnp{background:var(--pbg);color:var(--pur);border:1px solid var(--pm);}
.btno{background:var(--s2);color:var(--t2);border:0.5px solid var(--br);}
.btnsm{padding:8px 12px;font-size:12px;margin-bottom:0;}

.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--br);gap:8px;}
.row:last-child{border-bottom:none;}
.rl{flex:1;}
.rlabel{font-size:14px;}
.rsub{font-size:11px;color:var(--t3);margin-top:1px;}
.rval{font-size:14px;font-weight:700;flex-shrink:0;}

.ci{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--br);cursor:pointer;}
.ci:last-child{border-bottom:none;}
.cbox{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--br2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;}
.cbox.on{background:var(--gbg);border-color:var(--gm);}
.ck{font-size:11px;opacity:0;color:var(--grn);}
.cbox.on .ck{opacity:1;}
.cilabel{flex:1;}
.cititle{font-size:13px;transition:color .2s;}
.ci.on .cititle{color:var(--t3);text-decoration:line-through;}
.cisub{font-size:11px;color:var(--t3);margin-top:1px;}

.prog{height:5px;border-radius:3px;background:var(--s3);margin:8px 0;overflow:hidden;}
.progbar{height:100%;border-radius:3px;transition:width .4s;}

.evlist{}
.ev{display:flex;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--br);}
.ev:last-child{border-bottom:none;}
.evdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.evcontent{flex:1;min-width:0;}
.evtitle{font-size:13px;font-weight:500;}
.evsub{font-size:11px;color:var(--t3);margin-top:1px;}
.evamt{font-size:13px;font-weight:700;flex-shrink:0;text-align:right;}
.ev.feat{border-left:2px solid;padding-left:8px;margin-left:-8px;}
.ev.feat .evdot{display:none;}
.ev.feat .evtitle{font-weight:700;}
.wheader{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;padding:8px 0 4px;border-bottom:1px solid var(--br);margin-bottom:2px;display:flex;justify-content:space-between;}

.scard{background:var(--s2);border-radius:var(--rs);padding:12px;margin-bottom:6px;border:0.5px solid var(--br);}
.scard.active{border-color:var(--am);background:var(--abg);}
.scard.done{opacity:.3;}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.mbg.open{display:flex;}
.mbox{background:var(--sf);border-radius:var(--rx) var(--rx) 0 0;padding:20px;width:100%;max-width:580px;padding-bottom:max(20px,env(safe-area-inset-bottom));}
.mtitle{font-size:17px;font-weight:700;margin-bottom:14px;letter-spacing:-.3px;}
.minput{width:100%;background:var(--s2);border:1px solid var(--br2);border-radius:var(--rs);padding:12px 14px;font-size:16px;color:var(--tx);margin-bottom:10px;outline:none;}
.minput::placeholder{color:var(--t3);}
.minput:focus{border-color:var(--blu);}
select.minput option{background:var(--s2);}

.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--s4);color:var(--tx);padding:9px 18px;border-radius:18px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;border:0.5px solid var(--br2);}
.toast.show{opacity:1;}

.banner{background:var(--abg);border:1px solid var(--am);border-radius:var(--rs);padding:12px 13px;margin-bottom:8px;}
.banner-title{font-size:13px;font-weight:700;color:var(--amb);margin-bottom:3px;}
.banner-sub{font-size:12px;color:var(--t2);margin-bottom:10px;}

.ms{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--br);}
.ms:last-child{border-bottom:none;}
.ms-info{flex:1;}
.ms-label{font-size:13px;}
.ms-sub{font-size:11px;color:var(--t3);margin-top:1px;}
.ms-right{display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:max-content;}
.ms-date{font-size:13px;font-weight:700;white-space:nowrap;}
.reorder-btns{display:flex;flex-direction:column;gap:2px;margin-right:4px;}
.reorder-btn{background:var(--s3);border:0.5px solid var(--br);border-radius:4px;color:var(--t2);cursor:pointer;font-size:14px;padding:2px 6px;line-height:1;transition:all 0.15s;}
.reorder-btn:hover{background:var(--s4);color:var(--tx);}
.reorder-btn:active{transform:scale(0.95);}
.reorder-btn:disabled{opacity:0.3;cursor:not-allowed;}
.reorder-btn[title="Delete milestone"]:hover{background:var(--rbg);color:var(--red);}

.slog-entry{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--br);font-size:12px;}
.slog-entry:last-child{border-bottom:none;}
.slog-left{flex:1;}
.slog-label{color:var(--tx);font-weight:500;}
.slog-meta{color:var(--t3);margin-top:1px;font-size:11px;}
.slog-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.slog-amt{color:var(--red);font-weight:700;}
.slog-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;}
.slog-del:active{color:var(--red);}
@keyframes neg-pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,131,110,0.5);}50%{box-shadow:0 0 12px 3px rgba(232,131,110,0.8);}}
.neg-bal{font-size:14px;font-weight:900;color:var(--red);background:var(--rbg);padding:3px 8px;border-radius:6px;border:1px solid var(--rm);animation:neg-pulse 1.5s ease-in-out infinite;display:inline-block;}

.spendlog-header{cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center;}
.spendlog-arrow{font-size:14px;transition:transform 0.2s;color:var(--t3);}
.spendlog-arrow.open{transform:rotate(180deg);}
.spendlog-body{display:none;}
.spendlog-body.open{display:block;}

.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mnavtitle{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.mnavbtn{background:var(--s2);border:0.5px solid var(--br);border-radius:var(--rs);padding:7px 12px;font-size:13px;color:var(--tx);cursor:pointer;}
body.readonly .btn.btng,body.readonly .btn.btnr,body.readonly .reorder-btn{pointer-events:none;opacity:0.15;}
.ro-banner{display:none;text-align:center;padding:6px 10px;background:var(--amb);color:#000;font-size:12px;font-weight:600;position:sticky;top:0;z-index:10;}
body.readonly .ro-banner{display:block;}
.ro-switch{color:inherit;text-decoration:underline;cursor:pointer;margin-left:8px;}
</style>
</head>
<body>

<div class="ro-banner">👁️ Read-only mode — <span class="ro-switch" onclick="switchToAdmin()">Switch to admin</span></div>

<div class="overlay" id="pin-screen">
  <div class="pin-logo">💰</div>
  <div class="pin-title">HF Tracker</div>
  <div class="pin-sub">Enter PIN to continue</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-grid">
    <div class="pin-key" onclick="pinKey('1')">1</div>
    <div class="pin-key" onclick="pinKey('2')">2</div>
    <div class="pin-key" onclick="pinKey('3')">3</div>
    <div class="pin-key" onclick="pinKey('4')">4</div>
    <div class="pin-key" onclick="pinKey('5')">5</div>
    <div class="pin-key" onclick="pinKey('6')">6</div>
    <div class="pin-key" onclick="pinKey('7')">7</div>
    <div class="pin-key" onclick="pinKey('8')">8</div>
    <div class="pin-key" onclick="pinKey('9')">9</div>
    <div class="pin-key empty"></div>
    <div class="pin-key" onclick="pinKey('0')">0</div>
    <div class="pin-key del" onclick="pinDel()">⌫</div>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<div class="overlay hidden" id="load-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--t3);margin-top:14px;">Loading...</div>
</div>

<div class="toast" id="toast"></div>

<div class="mbg" id="mbg" onclick="closeModal()">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="mtitle" id="mtitle"></div>
    <input class="minput" type="text" id="mi-label" placeholder="Description" style="display:none;">
    <select class="minput" id="mi-category" style="display:none;">
      <option value="discretionary">Discretionary</option>
      <option value="gas">Gas</option>
      <option value="groceries">Groceries</option>
      <option value="other">Other</option>
    </select>
    <select class="minput" id="mi-acct" style="display:none;">
      <option value="4496">#4496 checking</option>
      <option value="0725">Savings #0725</option>
      <option value="6764">#6764 transitional</option>
    </select>
    <input class="minput" type="number" id="mi-amt" placeholder="Amount" inputmode="decimal">
    <button class="btn btng" onclick="submitModal()">Confirm</button>
    <button class="btn btno" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="mbg" id="bill-modal" onclick="closeBillModal()">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="mtitle" id="bm-title">Edit bill</div>
    <input class="minput" type="text" id="bm-name" placeholder="Bill name">
    <input class="minput" type="number" id="bm-amt" placeholder="Amount ($)" inputmode="decimal">
    <input class="minput" type="text" id="bm-day" placeholder="Due day e.g. 15 or 4,18 for biweekly" inputmode="numeric">
    <input class="minput" type="text" id="bm-note" placeholder="Note (optional)">
    <input class="minput" type="text" id="bm-keyword" placeholder="Debit keyword e.g. PUBLIX, T-MOBILE (optional)">
    <select class="minput" id="bm-freq" style="appearance:auto;">
      <option value="">Monthly</option>
      <option value="weekly">Weekly</option>
      <option value="biweekly">Biweekly (2x/month)</option>
      <option value="quarterly">Quarterly</option>
    </select>
    <input class="minput" type="text" id="bm-enddate" placeholder="End date YYYY-MM (optional, for fixed-term)">
    <input class="minput" type="number" id="bm-balance" placeholder="Current balance ($)" inputmode="decimal" style="display:none;">
    <input class="minput" type="text" id="bm-cardid" placeholder="Card ID for snowball (optional)">
    <button class="btn btng" onclick="saveBillModal()">Save</button>
    <button class="btn btno" onclick="closeBillModal()">Cancel</button>
  </div>
</div>

<div class="mbg" id="debit-modal" onclick="closeDebitModal()">
  <div class="mbox" onclick="event.stopPropagation()" style="max-height:80vh;overflow-y:auto;">
    <div class="mtitle">Pending Transactions</div>
    <div id="debit-modal-content"></div>
    <button class="btn btno" onclick="closeDebitModal()" style="margin-top:8px;">Close</button>
  </div>
</div>

<div class="mbg" id="phase-modal" onclick="closePhaseModal()">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="mtitle" id="pm-title">Add milestone</div>
    <input class="minput" type="text" id="pm-label" placeholder="Milestone name">
    <input class="minput" type="number" id="pm-cost" placeholder="Cost ($)" inputmode="decimal">
    <input class="minput" type="text" id="pm-target" placeholder="Target date YYYY-MM (optional)" inputmode="numeric" oninput="autoSuggestMonthly()">
    <div style="font-size:11px;color:var(--t3);margin-bottom:4px;">Monthly savings mode</div>
    <div style="display:flex;gap:16px;margin-bottom:8px;">
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--t2);cursor:pointer;">
        <input type="radio" name="savings-mode" value="fixed" checked onchange="toggleSavingsMode()"> Fixed $
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--t2);cursor:pointer;">
        <input type="radio" name="savings-mode" value="percent" onchange="toggleSavingsMode()"> % of pay
      </label>
    </div>
    <input class="minput" type="number" id="pm-monthly" placeholder="Save $/mo (optional — auto from target date)" inputmode="decimal">
    <input class="minput" type="number" id="pm-percent" placeholder="% of each paycheck (e.g. 5)" inputmode="decimal" min="1" max="100" style="display:none;">
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;color:var(--t2);">
      <input type="checkbox" id="pm-savings"> Transfer to savings
    </label>
    <button class="btn btng" onclick="savePhaseModal()">Save</button>
    <button class="btn btnr" id="pm-delete-btn" style="display:none;" onclick="deletePhaseModal()">Delete</button>
    <button class="btn btno" onclick="closePhaseModal()">Cancel</button>
  </div>
</div>

<div class="mbg" id="confirm-modal" onclick="closeConfirm()">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="mtitle" id="confirm-msg"></div>
    <button class="btn btnr" onclick="doConfirm()">Confirm</button>
    <button class="btn btno" onclick="closeConfirm()">Cancel</button>
  </div>
</div>

<nav class="nav" style="display:none;" id="main-nav">
  <button class="nb on" onclick="sw('week',this)">This Week</button>
  <button class="nb" onclick="sw('month',this)">Month Plan</button>
  <button class="nb" onclick="sw('snowball',this)">Roadmap</button>
</nav>

<div class="panel on" id="p-week" style="display:none;">
  <div class="bstrip">
    <div class="bitem" onclick="editBal('4496')">
      <div class="bacct">#4496</div>
      <div class="bnum" id="b4496" style="color:var(--blu);">--</div>
    </div>
    <div class="bitem" onclick="editBal('6764')">
      <div class="bacct">#6764</div>
      <div class="bnum" id="b6764" style="color:var(--blu);">--</div>
    </div>
    <div class="bitem" onclick="editBal('0725')">
      <div class="bacct">Savings</div>
      <div class="bnum" id="b0725" style="color:var(--pur);">--</div>
    </div>
  </div>
  <div class="sync-row">
    <span class="sync-dot sdpend" id="sync-dot"></span>
    <span id="sync-label">connecting...</span>
    <span style="color:var(--t4);">·</span>
    <span style="color:var(--t3);">Tap balance to update manually</span>
  </div>
  <div id="week-content"></div>
</div>

<div class="panel" id="p-month" style="display:none;">
  <div class="mnav">
    <button class="mnavbtn" onclick="changeMonth(-1)">← Prev</button>
    <div class="mnavtitle" id="month-title"></div>
    <button class="mnavbtn" onclick="changeMonth(1)">Next →</button>
  </div>
  <div id="month-content"></div>
</div>

<div class="panel" id="p-snowball" style="display:none;">
  <div id="snowball-content"></div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getDatabase,ref,onValue,set,get,runTransaction}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ══ FIREBASE ══
const FB=initializeApp({apiKey:"AIzaSyDsd7Pr0AEQ3j6n-bKXv7n06vYf9Hvew7Y",authDomain:"hf-tracker-81e76.firebaseapp.com",databaseURL:"https://hf-tracker-81e76-default-rtdb.firebaseio.com",projectId:"hf-tracker-81e76",storageBucket:"hf-tracker-81e76.firebasestorage.app",messagingSenderId:"810272700127",appId:"1:810272700127:web:f72c67e2a9d839a8049b6a"});
const db=getDatabase(FB);
let SECRET = '';
let STATE = null;

const PKEY='hft_auth';
const RPKEY='hft_readonly';

let configCache = null;
let _readOnly = false;
const configPromise = get(ref(db, 'app_config')).then(snap => {
  configCache = snap.val();
}).catch(() => {});
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
// Mutable: refreshed periodically by refreshNow() below so a tab left open
// across midnight/month-end doesn't keep operating on a stale "today"

let mKey=`${now.getFullYear()}-${now.getMonth()}`;

function resetMonthly(s){
  const oldKey=s.mKey;
  if(!s.discLogArchive)s.discLogArchive={};
  s.discLogArchive[oldKey]=s.discLog||[];
  s.mKey=mKey;s.discSpent=0;s.discLog=[];
  return s;
}

// Race-safe month rollover: uses a Firebase transaction so that if multiple
// tabs/devices detect the rollover around the same time, only one reset is
// applied atomically instead of a plain last-write-wins set() clobbering it.
async function reconcileMonth(){
  if(!STATE) return;
  try{
    const result=await runTransaction(STATE, current=>{
      if(!current) return undefined; // nothing there yet — normal load path handles first-time init
      if(current.mKey===mKey) return undefined; // already reconciled by another writer, no-op
      return resetMonthly({...defaultState(), ...current});
    });
    if(result.committed && result.snapshot.exists()){
      S={...defaultState(), ...S, ...result.snapshot.val()};
      setSS('ok');
    }
  }catch(e){
    console.warn('reconcileMonth failed', e);
  }
}

// Recompute "today" periodically so a tab/PWA left open across midnight or a
// month boundary doesn't keep every date-relative calculation (today
// highlighting, month rollover, payday checks, roadmap simulation start
// point) pinned to whatever date the page happened to load on.
async function refreshNow(){
  const n=new Date();
  const newMKey=`${n.getFullYear()}-${n.getMonth()}`;
  const dayChanged = n.getFullYear()!==now.getFullYear() || n.getMonth()!==now.getMonth() || n.getDate()!==now.getDate();
  now=n; mKey=newMKey;
  if(!appReady || !S) return;
  if(dayChanged){ _cachedRoadmap=null; _roadmapCacheKey=''; }
  if(S.mKey!==mKey){ await reconcileMonth(); }
  if(dayChanged){ renderAll(); }
}
setInterval(()=>{refreshNow().catch(e=>console.warn('refreshNow failed',e));}, 60000);

  S=s;setSS('pend');

  saveTimer=setTimeout(async()=>{
    try{await set(STATE,S);setSS('ok');}

async function loadFB(){
  document.getElementById('load-screen').classList.remove('hidden');
  try{
    const snap=await get(STATE);
    S=snap.exists()?{...defaultState(),...snap.val()}:defaultState();
    if(S.debitLog)S.debitLog=S.debitLog.filter(d=>d!=null);
    if(S.mKey!==mKey){
      await reconcileMonth();
    }
    if(!S.phases || S.phases.length === 0) {
      S.phases = JSON.parse(JSON.stringify(DEFAULT_PHASES));
    }
    if(!S.userBills || S.userBills.length === 0) {
      S.userBills = JSON.parse(JSON.stringify(DEFAULT_USER_BILLS));
    }
    if(!S.cardStartBals) {
      S.cardStartBals = {}; // Seeded by Apps Script seedDefaultBills()
    }
    setSS('ok');
  }catch(e){
    console.warn('load fail',e);
    S=defaultState();setSS('err');
  }
  document.getElementById('load-screen').classList.add('hidden');
  document.getElementById('main-nav').style.display='flex';
  document.querySelectorAll('.panel').forEach(p=>p.style.display='');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-week').classList.add('on');
  appReady=true;
  renderAll();
  fbListener = onValue(STATE, snap => {
    if (!snap.exists()) return;
    const remote = snap.val();
    _cachedRoadmap = null;
    _roadmapCacheKey = '';

    if (saveTimer) {
      S.bal4496 = remote.bal4496;
      S.bal6764 = remote.bal6764;
      S.bal0725 = remote.bal0725;
      S.karenLastPay = remote.karenLastPay;
      S.jonLastPay = remote.jonLastPay;
      S.jonAvgPay = remote.jonAvgPay;
      if(remote.karenLastPayDate) S.karenLastPayDate = remote.karenLastPayDate;
      if(remote.jonLastPayDate) S.jonLastPayDate = remote.jonLastPayDate;
      if(remote.debitLog) S.debitLog = remote.debitLog.filter(d => d != null);
      // Synced from Apps Script / month rollover — safe to always accept from remote
      if(remote.discSpent !== undefined) S.discSpent = remote.discSpent;
      if(remote.discLog) S.discLog = remote.discLog;
      if(remote.discMonthlyCap !== undefined) S.discMonthlyCap = remote.discMonthlyCap;
      if(remote.discWeekly !== undefined) S.discWeekly = remote.discWeekly;
      if(remote.discLogArchive) S.discLogArchive = remote.discLogArchive;
      if(remote.phaseDone) S.phaseDone = remote.phaseDone;
      if(remote.confirmed) S.confirmed = remote.confirmed;
      S.mKey = remote.mKey;
      if(S.mKey!==mKey){reconcileMonth();}
    } else {
      S = {...defaultState(), ...remote};
      if(S.debitLog)S.debitLog=S.debitLog.filter(d=>d!=null);
      if (S.mKey !== mKey) { reconcileMonth(); }
      if(!S.phases || S.phases.length === 0) {
        S.phases = JSON.parse(JSON.stringify(DEFAULT_PHASES));
      }
      if(!S.userBills || S.userBills.length === 0) {
        S.userBills = JSON.parse(JSON.stringify(DEFAULT_USER_BILLS));
      }
    }

    setSS('ok');
    if (window._renderTimeout) clearTimeout(window._renderTimeout);
    window._renderTimeout = setTimeout(() => {
      renderAll();
    }, 100);
  });
}

let pinBuf = '';
async function checkAuth() {
  if (sessionStorage.getItem(PKEY) === 'ok') {
    try {
      const config = configCache || (await get(ref(db, 'app_config'))).val();
      _readOnly = sessionStorage.getItem(RPKEY) === '1';

      SECRET = config.dataSecret;
      STATE = ref(db, `hft/${SECRET}/state`);

    } catch (e) {
      console.error("Auth Refresh Error:", e);
      sessionStorage.removeItem(PKEY);
      location.reload();
    }
  }
}

window.pinKey = k => {
  if (pinBuf.length >= 4) return;
  pinBuf += k;
  updatePinDots();
  if (pinBuf.length === 4) {
    setTimeout(async () => {
      await checkPin();
    }, 110);
  }
};

window.pinDel = () => {
  pinBuf = pinBuf.slice(0, -1);
  document.getElementById('pin-error').textContent = '';
  updatePinDots(false);
};

window.switchToAdmin = () => {
  sessionStorage.removeItem(PKEY);
  sessionStorage.removeItem(RPKEY);
  location.reload();
};

function updatePinDots(err = false) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('pd' + i);
    d.classList.toggle('filled', i < pinBuf.length && !err);
    d.classList.toggle('error', err);
  }
}

async function checkPin() {
  try {
    const config = configCache || (await get(ref(db, 'app_config'))).val();
    const msgUint8 = new TextEncoder().encode(pinBuf);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashedInput = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

    if (hashedInput === config.pinHash) {
      _readOnly = false;
      sessionStorage.setItem(RPKEY, '');
      SECRET = config.dataSecret;
      STATE = ref(db, `hft/${SECRET}/state`);
      sessionStorage.setItem(PKEY, 'ok');
      document.getElementById('pin-screen').classList.add('hidden');
      document.body.classList.remove('readonly');
      loadFB();
    } else if (config.pinReadOnlyHash && hashedInput === config.pinReadOnlyHash) {
      _readOnly = true;
      sessionStorage.setItem(RPKEY, '1');
      SECRET = config.dataSecret;
      STATE = ref(db, `hft/${SECRET}/state`);
      sessionStorage.setItem(PKEY, 'ok');
      document.getElementById('pin-screen').classList.add('hidden');
      document.body.classList.add('readonly');
      loadFB();
    } else {
      updatePinDots(true);
      document.getElementById('pin-error').textContent = 'Incorrect PIN';
      setTimeout(() => { pinBuf = ''; updatePinDots(false); }, 900);
    }
  } catch (e) {
    toast("Config Error");
  }
}

document.addEventListener('keydown', e => {

  if (e.key >= '0' && e.key <= '9') window.pinKey(e.key);

// ══ HELPER: Get card balance (from S.cardBals or CARD_START_BALS fallback) ══
function bal(cb, id) {
  // First check S.cardBals, then S.cardStartBals from Firebase
  if (cb && cb[id] !== undefined) return cb[id];
  if (S.cardStartBals && S.cardStartBals[id] !== undefined) return S.cardStartBals[id];
  return 0;
}

// ══ JON PAYDAY — suppress scheduled 7/22 if paycheck already arrived early ══
function jonPaidThisPeriod(year, month, schedDay) {
  const lpd = S.jonLastPayDate;
  if (!lpd) return false;
  const lp = new Date(lpd + 'T12:00:00');
  const ly = lp.getFullYear(), lm = lp.getMonth(), ld = lp.getDate();
  if (schedDay === 7) {
    const pm = month === 0 ? 11 : month - 1, py = month === 0 ? year - 1 : year;
    return (ly === py && lm === pm && ld >= 23) || (ly === year && lm === month && ld < 7);
  }
  return ly === year && lm === month && ld >= 8 && ld < 22;
}

// ══ KAREN PAYDAY (weekly anchor from last synced paydate) ══
function isKarenPayday(year, month, day) {
  const anchor = S.karenLastPayDate;
  if (!anchor) return new Date(year, month, day).getDay() === 4; // fallback: every Thursday
  const anchorMs = new Date(anchor + 'T12:00:00').getTime();
  const thisMs   = new Date(year, month, day).getTime();
  const diff     = Math.round((thisMs - anchorMs) / 86400000);
  return diff % 7 === 0;
}

// ══ DAILY BILLS ENGINE (Firebase-driven) ══
function getDailyBills(year, month, day, cardBalOverride) {
  const bills = [];
  const key = `${year}-${String(month + 1).padStart(2, '0')}`;
  const dow = new Date(year, month, day).getDay();
  const cb = cardBalOverride || (S.cardBals || {});
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const thisDate = new Date(year, month, day);
  const isFuture = thisDate > today;

  // Income
  let currentKaren = isFuture ? (S.karenAvgPay || S.karenLastPay || 810) : (S.karenLastPay || 810);
  let currentJon = isFuture ? (S.jonAvgPay || S.jonLastPay || 1641) : (S.jonLastPay || 1641);
  if (isFuture) { currentKaren = Math.floor(currentKaren); currentJon = Math.floor(currentJon); }

  if (day === 7 && !jonPaidThisPeriod(year,month,7)) bills.push({ label: 'Jon paycheck', amt: currentJon, isIncome: true });
  if (day === 22 && !jonPaidThisPeriod(year,month,22)) bills.push({ label: 'Jon paycheck', amt: currentJon, isIncome: true });
  // Show on actual paydate if it landed off-schedule
  const _jlpd=S.jonLastPayDate;
  if(_jlpd){const _jlp=new Date(_jlpd+'T12:00:00');if(_jlp.getFullYear()===year&&_jlp.getMonth()===month&&_jlp.getDate()===day&&day!==7&&day!==22)bills.push({label:'Jon paycheck',amt:currentJon,isIncome:true});}
  if (isKarenPayday(year, month, day)) bills.push({ label: 'Karen paycheck', amt: currentKaren, isIncome: true });

  // Process all userBills from Firebase
  const userBills = S.userBills || [];
  
  userBills.forEach(b => {
    // Check conditionEnd (e.g., "2027-03" — skip if past end date)
    if (b.conditionEnd && key > b.conditionEnd) return;
    // Bills with day 0 and no frequency are tracked via dedicated sync functions
    if (b.day === 0 && !b.frequency) return;
    // Self-liquidating bills (endDate set, no cardId) — stop after end month
    if (!b.cardId && b.endDate && key > b.endDate) return;
    // Skip paid-off snowball targets (cardId with balance at zero)
    if (b.cardId && bal(cb, b.cardId) <= 0) return;
    
    // Determine if this bill falls on this day
    let matchesDay = false;
    
    if (b.frequency === 'weekly' && b.dow !== undefined) {
      matchesDay = (dow === b.dow);
    } else if (b.frequency === 'quarterly' && b.frequencyMonths) {
      matchesDay = (day === b.day && b.frequencyMonths.includes(month));
    } else if (Array.isArray(b.day)) {
      matchesDay = b.day.map(Number).includes(day);
    } else {
      // Clamp to the last day of the month for bills whose day (e.g. 30 or 31)
      // doesn't exist in shorter months (Feb, Apr, Jun, Sep, Nov) instead of
      // silently skipping the bill that month
      const dimForBill = new Date(year, month + 1, 0).getDate();
      const effectiveDay = Math.min(b.day, dimForBill);
      matchesDay = (day === effectiveDay);
    }
    
    if (matchesDay && b.amt && b.amt !== 0) {
      bills.push({
        label: b.name,
        amt: -Math.abs(b.amt),
        isIncome: false,
        billId: b.id,
        ...(b.cardId ? { cardId: b.cardId } : {})
      });
    }
  });

  // Discretionary (Sunday)
  if (dow === 0) {
    const weeklyAmt = S.discWeekly || 50;
    const monthlyCap = S.discMonthlyCap || 200;
    const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();
    const actualSpent = isCurrentMonth ? (S.discSpent || 0) : 0;
    let plannedSpent = 0;
    for (let i = 1; i < day; i++) {
      if (new Date(year, month, i).getDay() === 0) plannedSpent += weeklyAmt;
    }
    const totalSpent = Math.max(actualSpent, plannedSpent);
    if (totalSpent < monthlyCap) {
      const lastDay = new Date(year, month + 1, 0).getDate();
      const isLastSunday = (day + 7) > lastDay;
      const remaining = monthlyCap - totalSpent;
      bills.push({
        label: 'Discretionary',
        amt: isLastSunday ? -remaining : -Math.min(weeklyAmt, remaining),
        isIncome: false
      });
    }
  }

  return bills.filter(b => b.amt !== 0);
}

// ══ ROADMAP ENGINE ══
let _cachedRoadmap = null;
let _roadmapCacheKey = '';
const phaseAmt=(id,def)=>{if(S.phaseCosts&&S.phaseCosts[id]!==undefined)return S.phaseCosts[id];return def;};

function getSnowballTargets() {
  // Build snowball targets from userBills that have a cardId
  const seen = new Set();
  const targets = [];
  (S.userBills || []).forEach(b => {
    if (b.cardId && !seen.has(b.cardId)) {
      seen.add(b.cardId);
      targets.push({
        id: b.cardId,
        label: b.name,
        startBal: bal(S.cardBals || {}, b.cardId),
        minPay: b.amt || 0
      });
    }
  });
  return targets;
}

function calcRoadmap(){
  const phasesKey = JSON.stringify(getPhases());
  const phaseDoneKey = JSON.stringify(S.phaseDone || {});
  const cardBalsKey = JSON.stringify(S.cardBals || {});
  const userBillsKey = JSON.stringify((S.userBills || []).filter(b => b.cardId || b.endDate).map(b => b.id));
  const cacheKey = `${S.bal4496}-${S.karenLastPay||0}-${S.karenAvgPay||0}-${S.karenLastPayDate||''}-${phasesKey}-${phaseDoneKey}-${cardBalsKey}-${userBillsKey}`;
  
  if (_cachedRoadmap && _roadmapCacheKey === cacheKey) {
    return _cachedRoadmap;
  }
  
  let balance=S.bal4496||0;
  const origCB=S.cardBals;
  const milestones={};
  const balLog={};
  const sinkingLog={};
  const phaseDone=S.phaseDone||{};
  const sinkingSaves={};

  const TARGETS = getSnowballTargets();

  // Clone card balances for simulation
  const cardBals={};
  TARGETS.forEach(t=>{cardBals[t.id]=bal(S.cardBals||{},t.id);});

  // Pending expense phases — split into threshold (blocks snowball) and sinking (runs concurrently)
  const allPending=getPhases().filter(p=>!phaseDone[p.id]);
  const pendingThresholdPhases=allPending.filter(p=>!p.monthlySave&&!p.percentOfPay);
  const pendingSinkingPhases=allPending.filter(p=>p.monthlySave||p.percentOfPay);
  pendingSinkingPhases.forEach(p=>{sinkingSaves[p.id]=0;});
  let lastPhaseDate=null;
  let snowballActive=pendingThresholdPhases.length===0;
  let snowIdx=TARGETS.findIndex(t=>cardBals[t.id]>0);
  if(snowIdx===-1)snowIdx=null;

  // Pre-check: if today's actual balance already covers the next phase, lock it to today
  // Built from local date components (not toISOString, which shifts to UTC and can land on
  // the wrong calendar day in the evening for US timezones behind UTC)
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  if(pendingThresholdPhases.length>0){
    const phase=pendingThresholdPhases[0];
    const needed=phaseAmt(phase.id,phase.cost)+800;
    if(balance>=needed){
      milestones[phase.id]={date:todayStr,bal:Math.round(balance)};
      balance-=phaseAmt(phase.id,phase.cost);
      lastPhaseDate=new Date(now);
      pendingThresholdPhases.shift();
      if(pendingThresholdPhases.length===0){
        snowballActive=true;
        milestones['snowball-start']={date:todayStr};
      }
    }
  }
  if(snowballActive && !milestones['snowball-start']){
    milestones['snowball-start']={date:todayStr};
  }

  // Store today's actual balance in balLog — it already reflects today's activity.
  // The simulation starts from tomorrow (line below), so no need to deduct today's bills.
  try{
    balLog[todayStr]=Math.round(balance);
  }finally{S.cardBals=origCB;}

  // Start simulation from tomorrow
  const d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);

  for(let i=0;i<1500;i++){
    const yr=d.getFullYear(),mo=d.getMonth(),dy=d.getDate();
    const dateStr=d.toISOString().split('T')[0];

    let dayBills;
    try{S.cardBals=cardBals;dayBills=getDailyBills(yr,mo,dy,cardBals);}finally{S.cardBals=origCB;}

    dayBills.forEach(b=>{
      balance+=b.amt;
      if(b.cardId&&cardBals[b.cardId]!==undefined){
        cardBals[b.cardId]=Math.max(0,cardBals[b.cardId]+b.amt);
      }
    });

    // Detect when the active snowball target gets paid off by its minimum payment
    if(snowballActive&&snowIdx!==null){
      const tgt=TARGETS[snowIdx];
      if(tgt&&cardBals[tgt.id]<=0&&!milestones[tgt.id+'-done']){
        cardBals[tgt.id]=0;
        milestones[tgt.id+'-done']={date:dateStr,label:tgt.label};
        snowIdx++;
        if(snowIdx>=TARGETS.length){milestones['debt-free']={date:dateStr};snowIdx=null;}
      }
    }

    // Check expense phase affordability (threshold-based only — sinking phases handled below)
    if(!snowballActive&&pendingThresholdPhases.length>0){
      const phase=pendingThresholdPhases[0];
      if(!phase.monthlySave){
        const gap=lastPhaseDate?Math.floor((d-lastPhaseDate)/86400000):999;
        if(!milestones[phase.id]&&gap>=14){
          const needed=phaseAmt(phase.id,phase.cost)+800;
          if(balance>=needed){
            const afterCost=balance-phaseAmt(phase.id,phase.cost);
            const nextJonDay=dy<7?7:dy<22?22:7;
            const nextJonMo=dy>=22?mo+1:mo;
            let sim=afterCost;
            let simOk=true;
            let rd=new Date(yr,mo,dy+1);
            const nextJon=new Date(yr,nextJonMo,nextJonDay);
            while(rd<nextJon){
              try{S.cardBals=cardBals;getDailyBills(rd.getFullYear(),rd.getMonth(),rd.getDate(),cardBals).forEach(b=>{sim+=b.amt;});}finally{S.cardBals=origCB;}
              if(sim<0){simOk=false;break;}
              rd.setDate(rd.getDate()+1);
            }
            if(simOk){
              milestones[phase.id]={date:dateStr,bal:Math.round(balance)};
              balance-=phaseAmt(phase.id,phase.cost);
              lastPhaseDate=new Date(d);
              pendingThresholdPhases.shift();
              if(pendingThresholdPhases.length===0){
                snowballActive=true;
                milestones['snowball-start']={date:dateStr};
              }
              balLog[dateStr]=Math.round(balance);
              d.setDate(dy+1);continue;
            }
          }
        }
      }
    }

    // Snowball payments on paycheck days — runs before sinking to get first crack at surplus
    if(snowballActive&&snowIdx!==null&&(dy===7||dy===22||isKarenPayday(yr,mo,dy))){
      const target=TARGETS[snowIdx];
      let reserve=0;
      const nextJonDay=dy<7?7:dy<22?22:7;
      const nextJonMo=dy>=22?mo+1:mo;
      let rd=new Date(yr,mo,dy+1);
      const nextJon=new Date(yr,nextJonMo,nextJonDay);
      while(rd<nextJon){
        try{S.cardBals=cardBals;getDailyBills(rd.getFullYear(),rd.getMonth(),rd.getDate(),cardBals).forEach(b=>{if(!b.isIncome&&b.amt<0&&b.label!==target.label)reserve+=Math.abs(b.amt);});}finally{S.cardBals=origCB;}
        rd.setDate(rd.getDate()+1);
      }
      const available=Math.max(0,balance-reserve);
      if(available>0&&cardBals[target.id]>0){
        let payment=Math.min(cardBals[target.id],available);
        if(balance-payment<200)payment=Math.max(0,balance-200);
        cardBals[target.id]-=payment;
        balance-=payment;
        if(cardBals[target.id]<=0){
          cardBals[target.id]=0;
          milestones[target.id+'-done']={date:dateStr,label:target.label};
          snowIdx++;
          if(snowIdx>=TARGETS.length){milestones['debt-free']={date:dateStr};snowIdx=null;}
        }
      }
    }

    // Concurrent sinking fund: set aside savings after snowball gets first priority
    // Runs regardless of snowballActive — sinking saves from remaining surplus
    if(pendingSinkingPhases.length>0&&(dy===7||dy===22||isKarenPayday(yr,mo,dy))){
      const jonAmt=Math.round(S.jonAvgPay||S.jonLastPay||1641);
      const karenAmt=Math.round(S.karenAvgPay||S.karenLastPay||810);
      const monthlyInc=jonAmt*2+Math.round(karenAmt*4.33);
      const payAmt=isKarenPayday(yr,mo,dy)?karenAmt:jonAmt;
      for(let si=pendingSinkingPhases.length-1;si>=0;si--){
        const sp=pendingSinkingPhases[si];
        const needed=phaseAmt(sp.id,sp.cost);
        let saveAmt=0;
        if(sp.savingsMode==='percent'&&sp.percentOfPay){
          saveAmt=Math.round(payAmt*sp.percentOfPay/100);
        }else if(sp.monthlySave){
          const saveFraction=Math.min(1,sp.monthlySave/monthlyInc);
          saveAmt=Math.round(payAmt*saveFraction);
        }
        if(saveAmt<=0)continue;
        const accumulated=sinkingSaves[sp.id]||0;
        if(balance>=saveAmt+300&&accumulated<needed){
          balance-=saveAmt;
          sinkingSaves[sp.id]=accumulated+saveAmt;
          sinkingLog[dateStr]=sinkingLog[dateStr]||{};
          sinkingLog[dateStr][sp.id]=(sinkingLog[dateStr][sp.id]||0)+saveAmt;
        }
        if((sinkingSaves[sp.id]||0)>=needed){
          milestones[sp.id]={date:dateStr,bal:Math.round(balance+(sinkingSaves[sp.id]||0))};
          sinkingSaves[sp.id]=0;
          pendingSinkingPhases.splice(si,1);
          balLog[dateStr]=Math.round(balance);
        }
      }
    }

    balLog[dateStr]=Math.round(balance);
    d.setDate(dy+1);
  }

  S.cardBals=origCB;
  const result = {milestones,balLog,sinkingLog,finalCardBals:cardBals};
  _cachedRoadmap = result;
  _roadmapCacheKey = cacheKey;
  return result;
}

// ══ MONTH EVENTS ══
function getMonthEvents(year,month,roadmap,balLog,sinkingLog){
  const evts=[];
  const key=`${year}-${String(month+1).padStart(2,'0')}`;
  const dim=new Date(year,month+1,0).getDate();
  const fromDay = 1;
  
  const phaseDone=S.phaseDone||{};
  const cb={...(S.cardBals||{})};
  getSnowballTargets().forEach(t=>{
    const done=roadmap[t.id+'-done'];
    if(done&&done.date.substring(0,7)<=key)cb[t.id]=0;
  });
  const add=(day,title,amt,color,note='',isIncome=false,feat=false,isFinal=false,billId=null)=>{
    if(day>=1&&day<=dim)evts.push({day,title,amt,color,note,isIncome,feat,isFinal,billId});
  };

  const todayDate = new Date();
  todayDate.setHours(0,0,0,0);
  const checkFuture = (d) => new Date(year, month, d) > todayDate;

  function getSmartNote(m, y) {
    const currentGoalIndex = getPhases().findIndex(p => !(S.phaseDone && S.phaseDone[p.id]));
    if (currentGoalIndex === -1) return '→ Surplus to snowball target';
    const p = getPhases()[currentGoalIndex];
    if (y < now.getFullYear() || (y === now.getFullYear() && m < now.getMonth())) {
      return 'Paycheck'; 
    }
    return `→ Saving for ${p.label} ($${p.cost.toLocaleString()})`;
  }

  const pcNote = getSmartNote(month, year);

  // Paychecks
  if(7>=fromDay && !jonPaidThisPeriod(year,month,7)){
    let amt=checkFuture(7)?(S.jonAvgPay||S.jonLastPay||1641):(S.jonLastPay||1641);
    add(7,'Jon paycheck',amt,'#7aad4e',pcNote,true);
  }
  if(22>=fromDay && !jonPaidThisPeriod(year,month,22)){
    let amt=checkFuture(22)?(S.jonAvgPay||S.jonLastPay||1641):(S.jonLastPay||1641);
    add(22,'Jon paycheck',amt,'#7aad4e',pcNote,true);
  }
  // Show on actual paydate if it arrived off-schedule this month
  {const _jlpd=S.jonLastPayDate;if(_jlpd){const _jlp=new Date(_jlpd+'T12:00:00');if(_jlp.getFullYear()===year&&_jlp.getMonth()===month){const _jd=_jlp.getDate();if(_jd!==7&&_jd!==22&&_jd>=fromDay&&(jonPaidThisPeriod(year,month,7)||jonPaidThisPeriod(year,month,22))){add(_jd,'Jon paycheck',S.jonLastPay||1641,'#7aad4e',pcNote,true);}}}}

  for(let d=fromDay; d<=dim; d++) {
    if(isKarenPayday(year,month,d)) {
      let amt = checkFuture(d) ? (S.karenAvgPay || S.karenLastPay || 810) : (S.karenLastPay || 810);
      add(d, 'Karen paycheck — Copans', amt, '#7aad4e', 'Direct deposit to #4496', true);
    }
  }

  // Sinking fund deductions — counted line items on each payday
  const sl=sinkingLog||{};
  for(let d=fromDay;d<=dim;d++){
    const dk=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const daySink=sl[dk];
    if(!daySink)continue;
    const labels=[];
    const notes=[];
    let total=0;
    Object.keys(daySink).forEach(pid=>{
      const amt=daySink[pid];
      if(!amt||amt<=0||phaseDone[pid])return;
      const phase=getPhases().find(p=>p.id===pid);
      if(!phase)return;
      labels.push(phase.label);
      const ref=phase.monthlySave?`$${phase.monthlySave}/mo`:phase.percentOfPay?`${phase.percentOfPay}% of pay`:'';
      notes.push(ref+' · '+phase.label);
      total+=amt;
    });
    if(total>0){
      add(d,`→ ${labels.join(', ')} savings`,-total,'#9b82e8',notes.join(' · '),false,true);
    }
  }

  // All bills from getDailyBills (Firebase-driven)
  const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  for(let d=fromDay; d<=dim; d++) {
    getDailyBills(year, month, d, cb).forEach(b => {
      if (b.isIncome) return; // Already handled above
      // Planned Sunday disc budget: skip past/today — actual disc shown via discLog
      if (!b.billId && b.label === 'Discretionary' && new Date(year, month, d) <= todayMidnight) return;
      const bill = (S.userBills || []).find(x => x.id === b.billId);
      const note = bill ? (bill.note || '') : '';
      const isDebt = bill && bill.cardId;
      const color = isDebt ? '#e8836e' : '#a8a69f';
      add(d, b.label, b.amt, color, note, false, false, false, b.billId || null);
    });
  }

  // Expense phase events from roadmap — threshold phases only (sinking shown via sinkingLog)
  getPhases().forEach(phase=>{
    if(phaseDone[phase.id])return;
    if(phase.monthlySave||phase.percentOfPay)return;
    const m=roadmap[phase.id];
    if(!m)return;
    const ed=new Date(m.date+'T12:00:00');
    if(ed.getFullYear()===year&&ed.getMonth()===month){
      const label=phase.isSavings?'TRANSFER → Savings #0725':phase.label.toUpperCase();
      const pCost=phaseAmt(phase.id,phase.cost);
      const note=phase.isSavings?`$${pCost.toLocaleString()} · transfer to savings then tap ✓`:`$${pCost.toLocaleString()} budget · calculated date`;
      add(ed.getDate(),label,-pCost,phase.isSavings?'#9b82e8':'#d4922a',note,false,true);
    }
  });

  // Snowball payment events
  const ssDate=roadmap['snowball-start']?.date;
  if(ssDate){
    const TARGETS = getSnowballTargets();
    for(let dd=fromDay;dd<=dim;dd++){
      const edow=new Date(year,month,dd).getDay();
      if(!(dd===7||dd===22||isKarenPayday(year,month,dd)))continue;
      const eventDate=`${year}-${String(month+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      if(eventDate<ssDate)continue;
      const activeTarget=TARGETS.find(t=>{
        if(ssDate>eventDate)return false;
        const done=roadmap[t.id+'-done'];
        return!done||done.date>=eventDate;
      });
      if(!activeTarget)continue;
      const prevDate=new Date(year,month,dd-1).toISOString().split('T')[0];
      const prevBal=balLog[prevDate],todayBal=balLog[eventDate];
      if(prevBal===undefined||todayBal===undefined)continue;
      const dayNet=getDailyBills(year,month,dd,cb).reduce((a,b)=>a+b.amt,0);
      const rawAmt=Math.round(prevBal+dayNet-todayBal);
      const phaseDeduction=getPhases().filter(p=>{
        const pm=roadmap[p.id];
        return pm&&pm.date===eventDate&&!(phaseDone[p.id])&&!p.monthlySave&&!p.percentOfPay;
      }).reduce((s,p)=>s+phaseAmt(p.id,p.cost),0);
      const sl2=sinkingLog||{};
      const sinkingOnDay=(sl2[eventDate]?Object.values(sl2[eventDate]).reduce((s,a)=>s+a,0):0);
      const payAmt=rawAmt-phaseDeduction-sinkingOnDay;
      if(payAmt<=5)continue;
      const isFinal=roadmap[activeTarget.id+'-done']?.date===eventDate;
      const title=isFinal?`${activeTarget.label} — CLEARED`:`Pay $${Math.round(payAmt).toLocaleString()} → ${activeTarget.label}`;
      evts.push({day:dd,title,amt:-payAmt,color:isFinal?'var(--pur)':'#7aad4e',note:isFinal?'Final payment · debt closed':'Snowball payment · log into card and pay now',isIncome:false,feat:true,isFinal});
    }
  }

  // Logged discretionary spends
  (S.discLog||[]).forEach(e=>{
    if(!e.date||!e.amt)return;
    const sp=new Date(e.date);
    if(isNaN(sp.getTime())||sp.getMonth()!==month||sp.getFullYear()!==year)return;
    const catLabel=e.cat&&e.cat!=='discretionary'?e.cat.charAt(0).toUpperCase()+e.cat.slice(1):'Discretionary';
    const catColor=e.cat==='gas'?'#5c5c58':e.cat==='groceries'?'#4a8fa8':'#6b9fd4';
    add(sp.getDate(),e.label||catLabel,-Math.abs(e.amt),catColor,'Logged · '+catLabel);
  });

  evts.sort((a,b)=>a.day-b.day);
  return evts;
}

// ══ SAFE RENDER WRAPPER ══
function safeRender(renderFn, fallbackText = 'Error loading data') {
  try {
    return renderFn();
  } catch (e) {
    console.error('Render error:', e);
    return `<div class="card" style="border-color:var(--rm);background:var(--rbg);">
      <div style="color:var(--red);font-weight:700;">⚠ ${fallbackText}</div>
      <div style="color:var(--t3);font-size:11px;margin-top:4px;">${e.message}</div>
    </div>`;
  }
}

// ══ DEBIT HELPERS ══
function getPostedEntry(billId,label){
  const log=S.debitLog||[];
  if(billId){const m=log.find(d=>d&&d.status==='matched'&&d.bill===billId);if(m)return m;}
  if(label){
    const bills=(S.userBills||[]);
    const bill=bills.find(b=>b.name&&b.name.toLowerCase()===label.toLowerCase());
    if(bill){const m=log.find(d=>d&&d.status==='matched'&&d.bill===bill.id);if(m)return m;}
  }
  return null;
}
function postedTag(billId,label){
  const m=getPostedEntry(billId,label);
  return m?` <span style="color:var(--grn);font-size:10px;font-weight:600;">✓ Posted $${m.amt} · ${m.date}</span>`:'';
}

            {label:'Mazda',       key:'mazda-done', color:'var(--blu)'},

    if(md>=todayDate&&md<in7){
      const mdMid=new Date(m.date+'T00:00:00'); const diff=Math.round((mdMid-todayDate)/86400000);
      addWE(today+diff,p.label.toUpperCase(),-phaseAmt(p.id,p.cost),false,'var(--amb)',`$${phaseAmt(p.id,p.cost).toLocaleString()} · calculated safe date`,true);
    }
  });
  if(allPhasesDone){
    const TARGETS = getSnowballTargets();
    const nxt=TARGETS.find(t=>bal(S.cardBals||{},t.id)>0);
    if(nxt){
      const m=roadmap[nxt.id+'-done'];if(m){
        const md=new Date(m.date+'T12:00:00');
        if(md>=todayDate&&md<in7){
          const mdMid=new Date(m.date+'T00:00:00'); const diff=Math.round((mdMid-todayDate)/86400000);
          addWE(today+diff,`${nxt.label} — PAID OFF`,0,false,'var(--pur)','Snowball clears this debt',true);
        }
      }
    }
  }
  const wdays=Object.keys(weekEvtsByDay).map(Number).sort((a,b)=>a-b);
  if(wdays.length){
    html+=`<div class="card"><div class="card-title">Next 7 days</div><div class="evlist">`;
    let runBal=balLog[todayKey]!==undefined?balLog[todayKey]:S.bal4496;
    wdays.forEach(day=>{
      const isToday=day===today;
      const ed=new Date(now.getFullYear(),now.getMonth(),day);
      const dow=DN[ed.getDay()];
      const dayKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      html+=`<div style="font-size:10px;color:${isToday?'var(--amb)':'var(--t3)'};font-weight:700;padding:${day===wdays[0]?'0':'8px'} 0 3px;text-transform:uppercase;letter-spacing:.06em;">${isToday?'TODAY · ':''}${dow} ${ed.getDate()}</div>`;
      let dayNet=weekEvtsByDay[day].reduce((a,e)=>a+(typeof e.amt==='number'?e.amt:0),0);
      // Use roadmap balLog when available (matches Month Plan), accumulate otherwise
      if(balLog[dayKey]!==undefined){runBal=balLog[dayKey];}else{runBal+=dayNet;}
      weekEvtsByDay[day].forEach(e=>{
        const ac=e.isIncome?'var(--grn)':e.amt<0?'var(--red)':e.color||'var(--t2)';
        const as=e.amt!==0?(e.amt>0?`+$${Math.round(e.amt).toLocaleString()}`:`-$${Math.round(Math.abs(e.amt)).toLocaleString()}`):'';
        html+=`<div class="ev${e.feat?' feat':''}" style="${e.feat?`border-left:2px solid ${e.color};padding-left:8px;margin-left:-8px;`:''}">
          <div class="evdot" style="background:${e.color||'var(--t3)'};${e.feat?'display:none;':''}"></div>
          <div class="evcontent">
            <div class="evtitle" style="${e.feat?`color:${e.color};font-weight:700;`:''}">${e.label}</div>
            ${e.note?`<div class="evsub">${e.note}</div>`:''}
            ${(()=>{const pm=getPostedEntry(e.billId,e.label);return pm?`<div style="font-size:10px;color:var(--grn);margin-top:1px;">✓ Posted $${pm.amt} · ${pm.date}</div>`:''})()}
          </div>
          ${as?`<div class="evamt" style="color:${ac};${e.feat?'font-weight:700;':''}">${as}</div>`:''}
        </div>`;
      });
      const bc=runBal<0?'var(--red)':runBal<300?'var(--amb)':'var(--blu)';
      const nc=dayNet>0?'var(--grn)':dayNet<0?'var(--red)':'var(--t3)';
      const ns=dayNet!==0?(dayNet>0?`+$${Math.round(dayNet).toLocaleString()}`:`-$${Math.round(Math.abs(dayNet)).toLocaleString()}`):'';
      html+=`<div style="display:flex;justify-content:flex-end;gap:6px;padding:4px 0 5px;border-top:0.5px solid var(--br);margin-top:2px;">
        ${ns?`<span style="font-size:11px;font-weight:600;color:${nc};">${ns}</span><span style="color:var(--t4);">·</span>`:''}
        ${runBal<0?`<span class="neg-bal">-$${Math.round(Math.abs(runBal)).toLocaleString()}</span>`:`<span style="font-size:12px;font-weight:700;color:${bc};">$${Math.round(runBal).toLocaleString()}</span>`}
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Discretionary
  const cap = S.discMonthlyCap || 200;
  const spent=S.discSpent||0;
  const rem=Math.max(0,cap-spent);
  const pct=Math.min(100,(spent/cap)*100);
  const sc=pct>80?'var(--red)':pct>50?'var(--amb)':'var(--grn)';
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

  html+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <div class="card-title" style="margin-bottom:0;">Discretionary · ${MN[now.getMonth()].substring(0,3)} · <span style="color:var(--t2);font-weight:400;">${daysLeft} day${daysLeft!==1?'s':''} left</span></div>

    <button class="btn btnr btnsm" onclick="openModal('spend','Log discretionary spend',true)">➕ Log spend</button>

  const log=S.discLog||[];

    html+=`<div class="card">
      <div class="spendlog-header" onclick="toggleSpendLog()">

// ══ RENDER MONTH ══
let vMonth=now.getMonth(),vYear=now.getFullYear();
const _minMonthDate=(()=>{const d=new Date(now.getFullYear(),now.getMonth()-12,1);return{y:d.getFullYear(),m:d.getMonth()};})();
window.changeMonth=function(dir){
  vMonth+=dir;
  if(vMonth>11){vMonth=0;vYear++;}
  if(vMonth<0){vMonth=11;vYear--;}
  if(vYear<_minMonthDate.y||(vYear===_minMonthDate.y&&vMonth<_minMonthDate.m)){vMonth=_minMonthDate.m;vYear=_minMonthDate.y;}
  renderMonth();
};

function renderMonth(){
  document.getElementById('month-title').textContent=`${MN[vMonth]} ${vYear}`;
  const roadmapData = safeRender(() => calcRoadmap(), 'Failed to calculate roadmap');
  if (typeof roadmapData === 'string') {
    document.getElementById('month-content').innerHTML = roadmapData;
    return;
  }
  const {milestones:roadmap,balLog,sinkingLog}=roadmapData;
  const evts=getMonthEvents(vYear,vMonth,roadmap,balLog,sinkingLog);
  const startDay=(vYear===2026&&vMonth===3)?22:1;
  const isCurMonth=vYear===now.getFullYear()&&vMonth===now.getMonth();
  const key=`${vYear}-${String(vMonth+1).padStart(2,'0')}`;

  let startBal=S.bal4496;
  if(!isCurMonth){
    const prevEnd=new Date(vYear,vMonth,0);
    let found=false;
    for(let d=new Date(prevEnd);d>=new Date(now.getFullYear(),now.getMonth(),now.getDate())&&!found;d.setDate(d.getDate()-1)){
      const k=d.toISOString().split('T')[0];
      if(balLog[k]!==undefined){startBal=balLog[k];found=true;}
    }
  }

  const totalIn=evts.filter(e=>e.isIncome&&e.day>=startDay).reduce((a,e)=>a+(e.amt||0),0);
  const totalOut=evts.filter(e=>!e.isIncome&&e.day>=startDay&&e.amt<0).reduce((a,e)=>a+Math.abs(e.amt),0);
  // For current month, today's balance already reflects today's activity — exclude from overview
  const todayIn=isCurMonth?evts.filter(e=>e.isIncome&&e.day===now.getDate()).reduce((a,e)=>a+(e.amt||0),0):0;
  const todayOut=isCurMonth?evts.filter(e=>!e.isIncome&&e.day===now.getDate()&&e.amt<0&&!e.feat).reduce((a,e)=>a+Math.abs(e.amt),0):0;
  const adjIn=totalIn-todayIn,adjOut=totalOut-todayOut;
  const net=adjIn-adjOut;

  let html=`<div class="card">
    <div class="card-title">Month overview</div>
    <div class="row"><div class="rl"><div class="rlabel">Income</div></div><div class="rval" style="color:var(--grn);">+$${Math.round(adjIn).toLocaleString()}</div></div>
    <div class="row"><div class="rl"><div class="rlabel">Bills + spending</div></div><div class="rval" style="color:var(--red);">-$${Math.round(adjOut).toLocaleString()}</div></div>
    <div class="row"><div class="rl"><div class="rlabel">Starting #4496</div></div><div class="rval" style="color:var(--blu);">$${Math.round(startBal).toLocaleString()}</div></div>
    <div class="row"><div class="rl"><div class="rlabel" style="font-weight:700;">Net</div></div><div class="rval" style="color:${net>=0?'var(--grn)':'var(--red)'};">${net>=0?'+':'-'}$${Math.round(Math.abs(net)).toLocaleString()}</div></div>
  </div>`;

  const byDay={};
  evts.forEach(e=>{if(e.day>=startDay){if(!byDay[e.day])byDay[e.day]=[];byDay[e.day].push(e);}});
  const sortedDays=Object.keys(byDay).map(Number).sort((a,b)=>a-b);
  let wdays=[],weeks=[];
  sortedDays.forEach((day,i)=>{
    wdays.push(day);
    if(new Date(vYear,vMonth,day).getDay()===6||i===sortedDays.length-1){weeks.push([...wdays]);wdays=[];}
  });

  weeks.forEach(wds=>{
    const wStart=wds[0],wEnd=wds[wds.length-1];
    const mn=MN[vMonth].substring(0,3);
    const allW=wds.flatMap(d=>byDay[d]);
    const wIn=allW.filter(e=>e.isIncome).reduce((a,e)=>a+(e.amt||0),0);
    const wOut=allW.filter(e=>!e.isIncome&&e.amt<0).reduce((a,e)=>a+Math.abs(e.amt),0);
    html+=`<div class="card"><div class="wheader"><span>${mn} ${wStart}–${wEnd}</span><span>${wIn>0?`<span style="color:var(--grn);">+$${Math.round(wIn).toLocaleString()}</span> `:''}${wOut>0?`<span style="color:var(--red);">-$${Math.round(wOut).toLocaleString()}</span>`:''}</span></div><div class="evlist">`;
    wds.forEach(day=>{
      const isToday=isCurMonth&&day===now.getDate();
      const isPast=isCurMonth&&day<now.getDate();
      const isFuture=!isCurMonth||day>=now.getDate();
      const dow=DN[new Date(vYear,vMonth,day).getDay()];
      const dayKey=`${vYear}-${String(vMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dayEndBal=balLog[dayKey];
      html+=`<div style="${isPast?'opacity:0.45;':''}margin-bottom:2px;"><div style="font-size:10px;color:${isToday?'var(--amb)':'var(--t3)'};font-weight:700;padding:7px 0 3px;text-transform:uppercase;letter-spacing:.06em;">${isToday?'TODAY · ':''}${dow} ${day}</div>`;
      (byDay[day]||[]).forEach(e=>{
        const amtNum=typeof e.amt==='number'?e.amt:0;
        const ac=e.isIncome?'var(--grn)':Math.abs(amtNum)>400?'var(--red)':'var(--t2)';
        const as=amtNum!==0?(amtNum>0?'+$'+Math.round(amtNum).toLocaleString():'-$'+Math.round(Math.abs(amtNum)).toLocaleString()):'';
        const featBorder=e.feat?`border-left:2px solid ${e.isFinal?'var(--pur)':e.color};padding-left:8px;margin-left:-8px;`:'';
        html+=`<div class="ev${e.feat?' feat':''}" style="${featBorder}">
          <div class="evdot" style="background:${e.color};"></div>
          <div class="evcontent">
            <div class="evtitle" style="font-size:13px;${e.feat?`color:${e.isFinal?'var(--pur)':e.color};`:''}">${e.title}</div>
            ${e.note?`<div class="evsub">${e.note}</div>`:''}
            ${(()=>{const pm=getPostedEntry(e.billId,e.label);return pm?`<div style="font-size:10px;color:var(--grn);margin-top:1px;">✓ Posted $${pm.amt} · ${pm.date}</div>`:''})()}
          </div>
          ${as?`<div class="evamt" style="color:${ac};${e.feat?'font-weight:700;':''}">${as}</div>`:''}
        </div>`;
      });
      const displayBal = dayEndBal !== undefined ? dayEndBal : (isToday ? S.bal4496 : undefined);
      if(isFuture&&displayBal!==undefined){
        const dayNet=(byDay[day]||[]).reduce((a,e)=>a+(typeof e.amt==='number'?e.amt:0),0);
        const nc=dayNet>0?'var(--grn)':dayNet<0?'var(--red)':'var(--t3)';
        const ns=dayNet!==0?(dayNet>0?`+$${Math.round(dayNet).toLocaleString()}`:`-$${Math.round(Math.abs(dayNet)).toLocaleString()}`):'';
        const bc=displayBal<0?'var(--red)':displayBal<300?'var(--red)':displayBal<600?'var(--amb)':'var(--blu)';
        html+=`<div style="display:flex;justify-content:flex-end;gap:6px;padding:4px 0 5px;border-top:0.5px solid var(--br);margin-top:2px;">
          ${ns?`<span style="font-size:11px;font-weight:600;color:${nc};">${ns}</span><span style="color:var(--t4);">·</span>`:''}
          ${displayBal<0?`<span class="neg-bal">-$${Math.round(Math.abs(displayBal)).toLocaleString()}</span>`:`<span style="font-size:12px;font-weight:700;color:${bc};">$${Math.round(displayBal).toLocaleString()}${displayBal<300?' ⚠':''}</span>`}
        </div>`;
      }
      html+='</div>';
    });
    html+=`</div></div>`;
  });

  if(isCurMonth){
    const cap=S.discMonthlyCap||200;
    const spent=S.discSpent||0;
    const diff=cap-spent;
    const pct=Math.min(100,Math.round((spent/cap)*100));
    const sc=pct>100?'var(--red)':pct>80?'var(--amb)':'var(--grn)';
    const label=diff>=0?`$${Math.round(diff)} under budget ✓`:`$${Math.round(Math.abs(diff))} over budget ⚠`;
    const lc=diff>=0?'var(--grn)':'var(--red)';
    html+=`<div class="card">
      <div class="card-title">Discretionary summary · ${MN[vMonth].substring(0,3)}</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span style="font-size:13px;color:var(--t2);">Spent</span>
        <span style="font-size:13px;font-weight:700;color:var(--red);">$${Math.round(spent)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:13px;color:var(--t2);">Cap</span>
        <span style="font-size:13px;color:var(--t3);">$${cap}</span>
      </div>
      <div class="prog"><div class="progbar" style="width:${pct}%;background:${sc};"></div></div>
      <div style="font-size:12px;font-weight:700;color:${lc};margin-top:6px;">${label}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:4px;">Tracking only — does not affect balance</div>
    </div>`;
  }

  const prevM=(vMonth-1+12)%12,prevY=vMonth===0?vYear-1:vYear;
  const nextM=(vMonth+1)%12,nextY=vMonth===11?vYear+1:vYear;
  html+=`<div style="display:flex;gap:8px;margin-top:4px;">
    <button class="btn btno" style="flex:1;" onclick="changeMonth(-1)" ${(vYear===_minMonthDate.y&&vMonth===_minMonthDate.m)?'disabled':''}>← ${MN[prevM].substring(0,3)} '${String(prevY).slice(2)}</button>
    <button class="btn btno" style="flex:1;" onclick="changeMonth(1)">${MN[nextM].substring(0,3)} '${String(nextY).slice(2)} →</button>
  </div>`;

  document.getElementById('month-content').innerHTML=html;
}

function toMonthlyAmt(b) {
  if (b.frequency === 'weekly') return b.amt * 4.33;
  if (b.frequency === 'quarterly') return b.amt / 3;
  if (b.frequency === 'biweekly') return (b.amt || 0) * (Array.isArray(b.day) ? b.day.length : 2);
  if (Array.isArray(b.day)) return (b.amt || 0) * b.day.length;
  return b.amt || 0;
}

window.toggleRoadmapSection = function(key) {
  let c = {};
  try { c = JSON.parse(localStorage.getItem('rmCollapsed') || '{}'); } catch {}
  c[key] = !c[key];
  localStorage.setItem('rmCollapsed', JSON.stringify(c));
  renderSnowball();
};

      <div style="font-size:10px;color:var(--t3);">/mo · incl. disc. cap</div>
    </div>
    <div style="text-align:center;padding:4px 8px;">
      <div style="font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;">Total bills</div>

      <div style="font-size:10px;color:var(--t3);">/mo</div>
    </div>
  </div>`;

  // Income card

  html+=`<div class="card" style="margin-bottom:8px;">
    <div class="card-title" style="margin-bottom:10px;">Monthly income</div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <div style="flex:1;background:var(--s2);border-radius:var(--rs);padding:10px;">
        <div style="font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;">Jon · 7th &amp; 22nd</div>
        <div style="font-size:16px;font-weight:700;color:var(--grn);">+$${jonAmt.toLocaleString()}</div>
        <div style="font-size:10px;color:var(--t3);margin-bottom:8px;">per check · ×2/mo</div>
        <button class="btn btno btnsm" style="margin-bottom:0;" onclick="openModal('jon-avg','Jon avg paycheck')">Edit</button>
      </div>
      <div style="flex:1;background:var(--s2);border-radius:var(--rs);padding:10px;">
        <div style="font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;">Karen · weekly</div>
        <div style="font-size:16px;font-weight:700;color:var(--grn);">+$${karenAmt.toLocaleString()}</div>

        <div style="font-size:10px;color:var(--t3);margin-bottom:8px;">per check · ×4.33/mo</div>

      </div>
    </div>
    <div style="border-top:0.5px solid var(--br);padding-top:10px;display:flex;flex-direction:column;gap:6px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:12px;color:var(--t3);">Monthly income</div>

      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:12px;color:var(--t3);">Monthly bills</div>
        <div style="font-size:14px;font-weight:700;color:var(--red);">-$${Math.round(grandTotal).toLocaleString()}/mo</div>
      </div>
      ${sinkingMo>0?`<div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-size:12px;color:var(--t3);">Sinking fund</div>

  // Expense phases

    const phasesList = getPhases();
    phasesList.forEach((p, index)=>{
      const done=phaseDone[p.id];
      const m=roadmap[p.id];
      const dateLabel=done?'DONE':m?new Date(m.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'calculating...';
      let targetInfo='';
      if(!done && m && p.targetDate){
        const targetMs=new Date(p.targetDate+'T12:00:00').getTime();
        const actualMs=new Date(m.date+'T12:00:00').getTime();

        const targetLabel=new Date(p.targetDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'});
        if(diffM>0){

      }
      if(!done && (p.monthlySave || p.percentOfPay)){
        targetInfo += p.monthlySave ? ` · 💰 $${p.monthlySave}/mo` : ` · 💰 ${p.percentOfPay}% of pay`;

      html+=`<div class="ms">

    const unreachablePhases=phasesList.filter(p=>!phaseDone[p.id]&&!roadmap[p.id]);

      html+=`<div style="margin-top:10px;padding:10px;background:rgba(217,40,47,0.08);border:1px solid rgba(217,40,47,0.2);border-radius:var(--rs);">`;

      html+=`<div style="font-size:11px;color:var(--t2);margin-bottom:6px;">Not projected within 4 years at current income — increase income, reduce other bills, or lower the cost</div>`;
      unreachablePhases.forEach(p=>{
        html+=`<div style="font-size:12px;color:var(--red);">${p.label} · $${phaseAmt(p.id,p.cost).toLocaleString()}</div>`;

      html+=`</div>`;
    }
  }
  html+=`</div>`;

  // Fixed-term bills (from Firebase userBills with endDate)
  const fixedBills=(S.userBills||[]).filter(b=>b.cardId||b.endDate);
  const totalOwed = TARGETS.reduce((sum, t) => sum + bal(cb, t.id), 0);
  html+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${rmCollapsed.fixed?'0':'10px'};cursor:pointer;" onclick="toggleRoadmapSection('fixed')">

        <div style="font-size:11px;color:var(--t3);">$${Math.round(fixedBillsTotal).toLocaleString()}/mo</div>

      const m=target?roadmap[target.id+'-done']:null;
      const payoffLabel=isPaidOff?'PAID OFF':m?new Date(m.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}):b.cardId?b.endDate:(()=>{const p=b.endDate.split('-');return MN[parseInt(p[1])-1].substring(0,3)+' '+p[0];})();

      </div>`;
    });
  }
  html+=`</div>`;

  // Recurring bills (no endDate)
  const recurBills=(S.userBills||[]).filter(b=>!b.cardId&&!b.endDate);
  const recurTotal=recurBills.reduce((a,b)=>a+toMonthlyAmt(b),0)+discMo;
  html+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${rmCollapsed.recurring?'0':'10px'};cursor:pointer;" onclick="toggleRoadmapSection('recurring')">
      <div>

      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn btng btnsm" style="width:auto;padding:8px 14px;" onclick="event.stopPropagation();addBill()">+ Add</button>
        <span style="color:var(--t3);font-size:13px;width:12px;text-align:center;">${rmCollapsed.recurring?'▶':'▼'}</span>

  if (!rmCollapsed.recurring) {
    if(!recurBills.length){
      html+=`<div style="font-size:13px;color:var(--t3);">No recurring bills</div>`;
    }
    const DOW_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    recurBills.forEach((b,i)=>{
      const dayLabel=b.frequency==='weekly'?`Every ${DOW_NAMES[b.dow??0]}`:b.frequency==='biweekly'?(Array.isArray(b.day)?b.day.map(d=>`~${d}th`).join(' + '):`~${b.day}th`):`~${b.day}th`;
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--br);${i===recurBills.length-1?'border-bottom:none;':''}">
        <div style="flex:1;min-width:0;cursor:pointer;" onclick="editBillItem('${b.id}')">
          <div style="font-size:13px;font-weight:600;">${b.name}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:1px;">${dayLabel}${b.note?' · '+b.note:''}</div>

let editingBill=null;

window.editBillItem=function(id){
  const bills=(S.userBills||[]);
  const b=bills.find(x=>x.id===id);
  if(!b)return;
  editingBill=id;
  const modal=document.getElementById('bill-modal');
  document.getElementById('bm-name').value=b.name;
  document.getElementById('bm-amt').value=b.amt;
  document.getElementById('bm-day').value=Array.isArray(b.day)?b.day.join(','):b.day;
  document.getElementById('bm-note').value=b.note||'';
  document.getElementById('bm-keyword').value=b.keyword||b.debitKeyword||'';
  document.getElementById('bm-freq').value=b.frequency||(Array.isArray(b.day)?'biweekly':'');
  document.getElementById('bm-enddate').value=b.cardId?'':(b.endDate||'');
  document.getElementById('bm-cardid').value=b.cardId||'';
  // Hide endDate for credit cards — payoff is projected by snowball, not manual
  document.getElementById('bm-enddate').style.display=b.cardId?'none':'';
  // Show current balance for credit cards so projections are accurate
  const balEl = document.getElementById('bm-balance');
  balEl.style.display = b.cardId ? '' : 'none';
  balEl.value = b.cardId ? bal(S.cardBals || {}, b.cardId) : '';
  document.getElementById('bm-title').textContent='Edit bill';
  modal.classList.add('open');
  setTimeout(()=>document.getElementById('bm-name').focus(),140);
};

window.addBill=function(){
  editingBill=null;
  const modal=document.getElementById('bill-modal');
  document.getElementById('bm-name').value='';
  document.getElementById('bm-amt').value='';
  document.getElementById('bm-day').value='';
  document.getElementById('bm-note').value='';
  document.getElementById('bm-keyword').value='';
  document.getElementById('bm-freq').value='';
  document.getElementById('bm-enddate').style.display='';
  document.getElementById('bm-enddate').value='';
  document.getElementById('bm-balance').style.display='none';
  document.getElementById('bm-balance').value='';
  document.getElementById('bm-cardid').value='';
  document.getElementById('bm-title').textContent='Add bill';
  modal.classList.add('open');
  setTimeout(()=>document.getElementById('bm-name').focus(),140);
};

window.saveBillModal=function(){
  const name=document.getElementById('bm-name').value.trim();
  const amt=parseFloat(document.getElementById('bm-amt').value);
  const dayRaw=document.getElementById('bm-day').value.trim();
  const note=document.getElementById('bm-note').value.trim();
  const keyword=document.getElementById('bm-keyword').value.trim().toUpperCase();
  const freq=document.getElementById('bm-freq').value;
  const endDate=document.getElementById('bm-enddate').value.trim();
  const cardId=document.getElementById('bm-cardid').value.trim();
  const days=dayRaw.split(',').map(d=>parseInt(d.trim())).filter(d=>!isNaN(d)&&d>=0&&d<=31);
  if(!name||isNaN(amt)||!days.length){toast('Fill in all required fields');return;}
  const bills=(S.userBills||[]);
  const billData={name,amt,day:days.length===1?days[0]:days,note,keyword};
  if(freq)billData.frequency=freq;
  if(endDate)billData.endDate=endDate;
  if(cardId){
    billData.cardId=cardId;
    const balVal=parseFloat(document.getElementById('bm-balance').value);
    if(!isNaN(balVal)&&balVal>=0){
      if(!S.cardBals)S.cardBals={};
      S.cardBals[cardId]=balVal;
    }
  }
  if(editingBill){
    const idx=bills.findIndex(b=>b.id===editingBill);
    if(idx>=0){
      bills[idx]={...bills[idx],...billData};
      if(!freq){delete bills[idx].frequency;delete bills[idx].dow;}
    }
  } else {
    bills.push({id:'bill_'+Date.now(),...billData});
  }
  S.userBills=bills;
  _cachedRoadmap = null;
  save(S);
  closeBillModal();
  renderSnowball();
  renderAll();
  toast(editingBill?'Bill updated':'Bill added');
};

window.deleteBill=function(id){
  const bills=(S.userBills||[]);
  const b=bills.find(x=>x.id===id);
  if(!b)return;
  appConfirm(`Delete "${b.name}"?`,()=>{
    S.userBills=bills.filter(x=>x.id!==id);
    _cachedRoadmap=null;
    save(S);renderSnowball();renderAll();toast('Bill removed');
  });
};

window.closeBillModal=()=>document.getElementById('bill-modal').classList.remove('open');

          <div style="display:flex;gap:6px;">

              <option value="">Link to bill...</option>${allBillOptions}
            </select>
            <button class="btn btng btnsm" style="font-size:11px;" onclick="resolveDebit(${idx},'link')">Link</button>

            <button class="btn btnsm" style="flex:1;font-size:11px;background:var(--s3);border:none;color:var(--t2);cursor:pointer;border-radius:6px;" onclick="resolveDebit(${idx},'ignore')">Ignore</button>

    });

  }

    html+=`<div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin:12px 0 8px;">Recent auto-matched</div>`;

      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--br);">

      </div>`;
    });
