<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a18">
<title>HF Tracker</title>
<style>
:root{
  --bg:#1a1a18;--sf:#252523;--s2:#2c2c2a;--s3:#343432;
  --br:rgba(255,255,255,0.08);
  --tx:#f0efe9;--t2:#b4b2a9;--t3:#666660;
  --red:#F09595;--rbg:#3d1515;--rm:#A32D2D;
  --amb:#EF9F27;--abg:#3d2800;--am:#854F0B;
  --grn:#97C459;--gbg:#1a2e08;--gm:#3B6D11;
  --blu:#85B7EB;--bbg:#0c2240;--bm:#185FA5;
  --pur:#C4B5FD;--pbg:#1e1a3d;--pm:#5B4FBF;
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5;overflow-x:hidden;}
.pin-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.pin-screen.hidden{display:none;}
.pin-logo{font-size:36px;margin-bottom:8px;}
.pin-title{font-size:22px;font-weight:700;margin-bottom:4px;}
.pin-sub{font-size:13px;color:var(--t3);margin-bottom:32px;}
.pin-dots{display:flex;gap:14px;margin-bottom:32px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--s3);border:2px solid var(--br);transition:all .15s;}
.pin-dot.filled{background:var(--blu);border-color:var(--bm);}
.pin-dot.error{background:var(--red);border-color:var(--rm);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px;}
.pin-key{background:var(--sf);border:0.5px solid var(--br);border-radius:var(--r);padding:18px;font-size:22px;font-weight:600;color:var(--tx);cursor:pointer;text-align:center;transition:opacity .1s,transform .1s;user-select:none;}
.pin-key:active{opacity:.7;transform:scale(.95);}
.pin-key.del{font-size:18px;color:var(--t2);}
.pin-key.empty{background:transparent;border-color:transparent;pointer-events:none;}
.pin-error{font-size:13px;color:var(--red);margin-top:16px;height:18px;}
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-screen.hidden{display:none;}
.spinner{width:32px;height:32px;border:3px solid var(--br);border-top-color:var(--blu);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.nav{display:flex;overflow-x:auto;background:var(--sf);border-bottom:1px solid var(--br);position:sticky;top:0;z-index:100;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;padding:13px 15px;font-size:12px;font-weight:600;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;letter-spacing:.03em;text-transform:uppercase;}
.nb.on{color:var(--blu);border-bottom-color:var(--blu);}
.panel{display:none;padding:12px 12px 100px;max-width:600px;margin:0 auto;}
.panel.on{display:block;}
.card{background:var(--sf);border-radius:var(--r);border:0.5px solid var(--br);padding:14px;margin-bottom:10px;}
.ct{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;}
.bstrip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;}
.bitem{background:var(--sf);border-radius:var(--rs);padding:8px 6px;border:0.5px solid var(--br);text-align:center;cursor:pointer;}
.bitem:active{opacity:.7;}
.bacct{font-size:9px;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;}
.bnum{font-size:15px;font-weight:700;margin-top:1px;}
.btn{display:block;width:100%;padding:13px;border-radius:var(--rs);border:none;font-size:15px;font-weight:700;cursor:pointer;text-align:center;margin-bottom:8px;transition:opacity .15s,transform .1s;}
.btn:active{opacity:.8;transform:scale(.98);}
.btng{background:var(--gbg);color:var(--grn);border:1px solid var(--gm);}
.btnr{background:var(--rbg);color:var(--red);border:1px solid var(--rm);}
.btna{background:var(--abg);color:var(--amb);border:1px solid var(--am);}
.btnb{background:var(--bbg);color:var(--blu);border:1px solid var(--bm);}
.btno{background:var(--s2);color:var(--t2);border:0.5px solid var(--br);}
.btnsm{padding:9px 14px;font-size:13px;margin-bottom:6px;}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--br);gap:8px;}
.row:last-child{border-bottom:none;}
.rl{flex:1;}
.rlabel{font-size:14px;color:var(--tx);}
.rsub{font-size:11px;color:var(--t3);margin-top:1px;}
.rval{font-size:14px;font-weight:700;flex-shrink:0;}
.ci{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--br);cursor:pointer;}
.ci:last-child{border-bottom:none;}
.cb{width:24px;height:24px;border-radius:6px;border:2px solid var(--br);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;}
.cb.done{background:var(--gbg);border-color:var(--gm);}
.ck{font-size:13px;opacity:0;transition:opacity .2s;color:var(--grn);}
.cb.done .ck{opacity:1;}
.cil{flex:1;}
.cititle{font-size:14px;color:var(--tx);transition:color .2s;}
.ci.done .cititle{color:var(--t3);text-decoration:line-through;}
.cisub{font-size:11px;color:var(--t3);margin-top:1px;}
.wgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0;}
.wp{border-radius:var(--rs);padding:10px 4px;text-align:center;cursor:pointer;border:1px solid var(--br);background:var(--s2);transition:all .2s;}
.wp.used{background:var(--rbg);border-color:var(--rm);}
.wp.cur{border-color:var(--amb);border-width:2px;}
.wplabel{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;}
.wp.used .wplabel{color:var(--red);}
.wp.cur .wplabel{color:var(--amb);}
.wpval{font-size:14px;font-weight:700;margin-top:2px;color:var(--t2);}
.wp.used .wpval{color:var(--red);}
.wp.cur .wpval{color:var(--amb);}
.prog{height:6px;border-radius:3px;background:var(--s2);margin:8px 0;overflow:hidden;}
.progfill{height:100%;border-radius:3px;transition:width .4s;}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.mnavtitle{font-size:17px;font-weight:700;}
.mnavbtn{background:var(--s2);border:0.5px solid var(--br);border-radius:var(--rs);padding:8px 14px;font-size:14px;color:var(--tx);cursor:pointer;}
.event{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--br);}
.event:last-child{border-bottom:none;}
.edot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.econtent{flex:1;min-width:0;}
.etitle{font-size:13px;font-weight:600;color:var(--tx);}
.esub{font-size:11px;color:var(--t3);margin-top:1px;}
.eamt{font-size:13px;font-weight:700;flex-shrink:0;text-align:right;min-width:52px;}
.wheader{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;padding:8px 0 5px;border-bottom:1px solid var(--br);margin-bottom:4px;display:flex;justify-content:space-between;}
.tcard{background:var(--s2);border-radius:var(--rs);padding:13px;margin-bottom:8px;border:1px solid var(--br);}
.tcard.active{border-color:var(--am);background:var(--abg);}
.tcard.tdone{opacity:0.35;}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.mbg.show{display:flex;}
.modal{background:var(--sf);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-width:600px;}
.mtitle{font-size:17px;font-weight:700;margin-bottom:14px;}
.modal input,.modal select{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:var(--rs);padding:12px 14px;font-size:16px;color:var(--tx);margin-bottom:10px;}
.modal input::placeholder{color:var(--t3);}
.modal select option{background:var(--s2);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--s3);color:var(--tx);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;border:0.5px solid var(--br);}
.toast.show{opacity:1;}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:6px;vertical-align:middle;}
.sok{background:var(--grn);}
.serr{background:var(--red);}
.spend{background:var(--amb);}
.confirm-banner{background:var(--abg);border:1px solid var(--am);border-radius:var(--rs);padding:12px 14px;margin-bottom:10px;}
.cb-title{font-size:14px;font-weight:700;color:var(--amb);margin-bottom:4px;}
.cb-sub{font-size:12px;color:var(--t2);margin-bottom:10px;}
.milestone{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--br);}
.milestone:last-child{border-bottom:none;}
.ms-label{font-size:13px;color:var(--tx);flex:1;}
.ms-sub{font-size:11px;color:var(--t3);margin-top:1px;}
.ms-date{font-size:13px;font-weight:700;flex-shrink:0;text-align:right;}
.ms-done{color:var(--grn);}
.ms-soon{color:var(--amb);}
.ms-future{color:var(--t2);}
</style>
</head>
<body>

<div class="pin-screen" id="pin-screen">
  <div class="pin-logo">💰</div>
  <div class="pin-title">HF Tracker</div>
  <div class="pin-sub">Enter PIN to continue</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-grid">
    <div class="pin-key" onclick="pinKey('1')">1</div>
    <div class="pin-key" onclick="pinKey('2')">2</div>
    <div class="pin-key" onclick="pinKey('3')">3</div>
    <div class="pin-key" onclick="pinKey('4')">4</div>
    <div class="pin-key" onclick="pinKey('5')">5</div>
    <div class="pin-key" onclick="pinKey('6')">6</div>
    <div class="pin-key" onclick="pinKey('7')">7</div>
    <div class="pin-key" onclick="pinKey('8')">8</div>
    <div class="pin-key" onclick="pinKey('9')">9</div>
    <div class="pin-key empty"></div>
    <div class="pin-key" onclick="pinKey('0')">0</div>
    <div class="pin-key del" onclick="pinDel()">⌫</div>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<div class="loading-screen hidden" id="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--t3);">Loading...</div>
</div>

<div class="toast" id="toast"></div>

<div class="mbg" id="mbg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mtitle" id="mtitle"></div>
    <input type="text" id="mi-label" placeholder="Description" style="display:none;">
    <select id="mi-acct" style="display:none;">
      <option value="4496">#4496 checking</option>
      <option value="savings">Savings #0725</option>
      <option value="6764">#6764 (transitional)</option>
      <option value="cash">Cash / other</option>
    </select>
    <input type="number" id="mi-amt" placeholder="Amount" inputmode="decimal">
    <button class="btn btng" onclick="submitModal()">Confirm</button>
    <button class="btn btno" onclick="closeModal()">Cancel</button>
  </div>
</div>

<nav class="nav" style="display:none;" id="main-nav">
  <button class="nb on" onclick="sw('week',this)">This Week</button>
  <button class="nb" onclick="sw('month',this)">Month Plan</button>
  <button class="nb" onclick="sw('snowball',this)">Snowball</button>
  <button class="nb" onclick="sw('bills',this)">Bills</button>
</nav>

<div class="panel on" id="p-week" style="display:none;">
  <div id="week-banner"></div>
  <div class="bstrip">
    <div class="bitem" onclick="editBal('4496')">
      <div class="bacct">#4496</div>
      <div class="bnum" id="b4496" style="color:var(--blu);">--</div>
    </div>
    <div class="bitem" onclick="editBal('6764')">
      <div class="bacct">#6764</div>
      <div class="bnum" id="b6764" style="color:var(--blu);">--</div>
    </div>
    <div class="bitem" onclick="editBal('0725')">
      <div class="bacct">Savings</div>
      <div class="bnum" id="b0725" style="color:var(--pur);">--</div>
    </div>
  </div>
  <div style="font-size:10px;color:var(--t3);text-align:center;margin-bottom:10px;">
    Tap any balance to update
    <span class="sync-dot spend" id="sync-dot"></span>
    <span id="sync-label" style="font-size:10px;color:var(--t3);">connecting...</span>
  </div>
  <div id="week-content"></div>
</div>

<div class="panel" id="p-month" style="display:none;">
  <div class="mnav">
    <button class="mnavbtn" onclick="changeMonth(-1)">← Prev</button>
    <div class="mnavtitle" id="month-title"></div>
    <button class="mnavbtn" onclick="changeMonth(1)">Next →</button>
  </div>
  <div id="month-content"></div>
</div>

<div class="panel" id="p-snowball" style="display:none;">
  <div id="snowball-content"></div>
</div>

<div class="panel" id="p-bills" style="display:none;">
  <div style="font-size:20px;font-weight:700;margin-bottom:2px;">Monthly bills</div>
  <div style="font-size:12px;color:var(--t3);margin-bottom:12px;">All autopay — tap to verify processed</div>
  <div class="card">
    <div id="bills-list"></div>
    <button class="btn btno btnsm" style="margin-top:10px;" onclick="resetBills()">Reset all</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDsd7Pr0AEQ3j6n-bKXv7n06vYf9Hvew7Y",
  authDomain: "hf-tracker-81e76.firebaseapp.com",
  databaseURL: "https://hf-tracker-81e76-default-rtdb.firebaseio.com",
  projectId: "hf-tracker-81e76",
  storageBucket: "hf-tracker-81e76.firebasestorage.app",
  messagingSenderId: "810272700127",
  appId: "1:810272700127:web:f72c67e2a9d839a8049b6a"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const SECRET = '1e4ce42d793ba967a33d1bb54dbc6faaed0aab5c115f0671e2ef77db1d66203e';
const stateRef = ref(db, `hft/${SECRET}/state`);

// ── CONSTANTS ──
const PIN = '0628';
const PKEY = 'hft_auth';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const JON_PAY = 1641;
const now = new Date();
const mKey = `${now.getFullYear()}-${now.getMonth()}`;

const EXPENSE_PHASES = [
  { id:'jon-tires',   label:"Jon's tires + oil",     cost:1500, isSavings:false },
  { id:'repair-buf',  label:'Repair buffer (savings)',cost:1000, isSavings:true  },
  { id:'karen-tires', label:"Karen's tires",          cost:1000, isSavings:false },
  { id:'dental',      label:'Dental — Jon + Karen',   cost:500,  isSavings:false },
  { id:'glasses',     label:'Glasses — Jon + Karen',  cost:1000, isSavings:false },
];

const SNOWBALL_TARGETS = [
  { id:'amazon',   label:'Amazon Store Card',     startBal:206,   minPay:29,  apr:0.29   },
  { id:'merrick',  label:'Merrick Bank',          startBal:926,   minPay:35,  apr:0.3195 },
  { id:'cap3186',  label:'Cap One #3186 (Karen)', startBal:491,   minPay:25,  apr:0.2824 },
  { id:'kpaypal',  label:"Karen's PayPal Credit", startBal:1958,  minPay:100, apr:0.2964 },
  { id:'usaaAmex', label:'USAA Amex (Karen)',     startBal:1847,  minPay:63,  apr:0.274  },
  { id:'cap4565',  label:'Cap One #4565 (Jon)',   startBal:726,   minPay:25,  apr:0.29   },
  { id:'cap5592',  label:'Cap One #5592 (Karen)', startBal:731,   minPay:25,  apr:0.2899 },
  { id:'cap7988',  label:'Cap One #7988 (Jon)',   startBal:843,   minPay:30,  apr:0.29   },
  { id:'chase',    label:'Chase/Amazon Prime',    startBal:1000,  minPay:26,  apr:0.24   },
  { id:'tn',       label:'TN Unemployment',       startBal:3653,  minPay:153, apr:0      },
  { id:'irs',      label:'IRS 2024',              startBal:4767,  minPay:103, apr:0      },
  { id:'mazda',    label:'Mazda CX-5',            startBal:20693, minPay:638, apr:0.1272 },
];

// ── STATE ──
let S = {};
let saveTimer = null;
let appReady = false;

function defaultState() {
  return {
    mKey,
    bal4496:1258, bal6764:19, bal0725:654,
    karenLastPay:810.79, karenAvgPay:762,
    discSpent:0, discLog:[],
    weeks:[null,null,null,null],
    randySessions:[],
    billChecks:{}, pcChecks:{},
    snowballPhase:0,
    phaseDone:{},
    cardBals:{},
    snowballLog:[],
    unexpected:[{label:'Vehicle registration renewal',acct:'4496',amt:220.40,date:'4/23/2026'}],
    confirmed:{},
    regLogged:true,
  };
}

function resetMonthly(s) {
  s.mKey=mKey; s.discSpent=0; s.discLog=[];
  s.weeks=[null,null,null,null]; s.randySessions=[];
  s.billChecks={}; s.pcChecks={};
  return s;
}

// ── SYNC ──
function setSyncStatus(st) {
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if(!dot||!lbl)return;
  dot.className='sync-dot '+(st==='ok'?'sok':st==='err'?'serr':'spend');
  lbl.textContent=st==='ok'?'synced':st==='err'?'sync error':'saving...';
}
function save(s) {
  S=s; setSyncStatus('spend');
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{ await set(stateRef,S); setSyncStatus('ok'); }
    catch(e){ setSyncStatus('err'); }
  },800);
}
async function loadFromFirebase() {
  document.getElementById('loading-screen').classList.remove('hidden');
  try {
    const snap=await get(stateRef);
    S=snap.exists()?{...defaultState(),...snap.val()}:defaultState();
    if(!snap.exists())await set(stateRef,S);
    if(S.mKey!==mKey)S=resetMonthly(S);
    setSyncStatus('ok');
  } catch(e) { S=defaultState(); setSyncStatus('err'); }
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('main-nav').style.display='flex';
  document.querySelectorAll('.panel').forEach(p=>p.style.display='');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-week').classList.add('on');
  appReady=true;
  renderAll();
  onValue(stateRef,snap=>{
    if(!snap.exists()||saveTimer)return;
    S={...defaultState(),...snap.val()};
    if(S.mKey!==mKey)S=resetMonthly(S);
    renderAll(); setSyncStatus('ok');
  });
}

// ── PIN ──
let pinEntry='';
function checkAuth(){if(sessionStorage.getItem(PKEY)==='ok'){document.getElementById('pin-screen').classList.add('hidden');loadFromFirebase();}}
window.pinKey=k=>{if(pinEntry.length>=4)return;pinEntry+=k;updateDots();if(pinEntry.length===4)setTimeout(checkPin,120);};
window.pinDel=()=>{pinEntry=pinEntry.slice(0,-1);document.getElementById('pin-error').textContent='';updateDots(false);};
function updateDots(err=false){for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);d.classList.toggle('filled',i<pinEntry.length&&!err);d.classList.toggle('error',err&&i<4);}}
function checkPin(){
  if(pinEntry===PIN){sessionStorage.setItem(PKEY,'ok');document.getElementById('pin-screen').classList.add('hidden');loadFromFirebase();}
  else{updateDots(true);document.getElementById('pin-error').textContent='Incorrect PIN';setTimeout(()=>{pinEntry='';updateDots(false);document.getElementById('pin-error').textContent='';},900);}
}
document.addEventListener('keydown',e=>{if(document.getElementById('pin-screen').classList.contains('hidden'))return;if(e.key>='0'&&e.key<='9')window.pinKey(e.key);if(e.key==='Backspace')window.pinDel();});

// ── ROUTING ──
window.sw=function(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  el.classList.add('on');
  window.scrollTo(0,0);
  if(id==='week')renderWeek();
  if(id==='month')renderMonth();
  if(id==='snowball')renderSnowball();
  if(id==='bills')renderBills();
};

// ── ROADMAP ENGINE ──
function calcRoadmap() {
  let bal=S.bal4496||0;
  const milestones={};
  const balLog={};
  const phaseDone=S.phaseDone||{};
  const pendingPhases=EXPENSE_PHASES.filter(p=>!phaseDone[p.id]&&!p.isSavings);
  const repairBufDone=phaseDone['repair-buf'];

  const cardBals={};
  SNOWBALL_TARGETS.forEach(t=>{
    cardBals[t.id]=(S.cardBals&&S.cardBals[t.id]!==undefined)?S.cardBals[t.id]:t.startBal;
  });

  let snowballActive=pendingPhases.length===0;
  let currentSnowIdx=SNOWBALL_TARGETS.findIndex(t=>cardBals[t.id]>0);
  if(currentSnowIdx===-1)currentSnowIdx=null;

  let repairHeld=(!repairBufDone&&!phaseDone['jon-tires'])?0:(!repairBufDone?1000:0);
  let lastPhaseDate=null;

  const d=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const maxDays=48*30;

  for(let i=0;i<maxDays;i++){
    const year=d.getFullYear();
    const month=d.getMonth();
    const day=d.getDate();
    const dateStr=d.toISOString().split('T')[0];

    // Apply daily bills
    getDailyBills(year,month,day).forEach(b=>{bal+=b.amt;});

    // Mark repair buffer after tires
    if(milestones['jon-tires']&&!repairBufDone&&!milestones['repair-buf']){
      milestones['repair-buf']={date:milestones['jon-tires'].date};
      repairHeld=1000;
    }

    // Check expense affordability
    if(!snowballActive&&pendingPhases.length>0){
      const phase=pendingPhases[0];
      const gap=lastPhaseDate?Math.floor((d-lastPhaseDate)/86400000):999;
      if(!milestones[phase.id]&&gap>=14){
        const needed=phase.cost+800+repairHeld;
        if(bal>=needed){
          milestones[phase.id]={date:dateStr,bal:Math.round(bal)};
          bal-=phase.cost;
          lastPhaseDate=new Date(d);
          if(phase.id==='karen-tires')repairHeld=0;
          pendingPhases.shift();
          if(pendingPhases.length===0){
            snowballActive=true;
            milestones['snowball-start']={date:dateStr};
          }
          balLog[dateStr]=Math.round(bal);
          d.setDate(d.getDate()+1);
          continue;
        }
      }
    }

    // Snowball payments on paycheck days
    if((day===7||day===22||d.getDay()===4)&&snowballActive&&currentSnowIdx!==null){
      const target=SNOWBALL_TARGETS[currentSnowIdx];
      // Reserve bills until next Jon paycheck, excluding current target's minimum
      const _saved=S.cardBals;
      S.cardBals={...(S.cardBals||{}),...cardBals};
      let reserve=300;
      const nextJonDay=day<7?7:day<22?22:7;
      const nextJonMonth=day>=22?month+1:month;
      let rd=new Date(year,month,day+1);
      const nextJon=new Date(year,nextJonMonth,nextJonDay);
      while(rd<nextJon){
        getDailyBills(rd.getFullYear(),rd.getMonth(),rd.getDate())
          .forEach(b=>{
            if(!b.isIncome&&b.amt<0&&b.label!==target.label)
              reserve+=Math.abs(b.amt);
          });
        rd.setDate(rd.getDate()+1);
      }
      S.cardBals=_saved;
      const available=Math.max(0,bal-reserve);
      if(available>0&&cardBals[target.id]>0){
        const payment=Math.min(cardBals[target.id],available);
        cardBals[target.id]-=payment;
        bal-=payment;
        if(cardBals[target.id]<=0){
          cardBals[target.id]=0;
          milestones[target.id+'-done']={date:dateStr,label:target.label};
          currentSnowIdx++;
          if(currentSnowIdx>=SNOWBALL_TARGETS.length){
            milestones['debt-free']={date:dateStr};
            currentSnowIdx=null;
          }
        }
      }
    }

    balLog[dateStr]=Math.round(bal);
    d.setDate(d.getDate()+1);
  }

  return {milestones,balLog,finalCardBals:cardBals};
}

// ── SURPLUS ──
function nextPC(day){return day<7?7:day<22?22:7;}
function nextPCMonth(day){return day>=22?(now.getMonth()+1>11?0:now.getMonth()+1):now.getMonth();}
function calcSurplus(evts){
  const today=now.getDate();
  const npc=nextPC(today);
  const npcm=nextPCMonth(today);
  const isSame=npcm===now.getMonth();
  const endDay=isSame?npc:32;
  const due=(evts||[]).filter(e=>!e.isIncome&&typeof e.amt==='number'&&e.amt<0&&e.day>today&&e.day<endDay);
  const totalDue=due.reduce((a,e)=>a+Math.abs(e.amt),0);
  const safe=Math.max(0,S.bal4496-totalDue-300);
  return{due,totalDue,safe,npcLabel:`${MONTHS[npcm].substring(0,3)} ${npc}`};
}

// ── MONTH EVENTS ──
function getMonthEvents(year,month,roadmap,balLog){
  const evts=[];
  const add=(day,title,amt,color,note,isIncome=false,featured=false,isFinal=false)=>{
    const dim=new Date(year,month+1,0).getDate();
    if(day>=1&&day<=dim)evts.push({day,title,amt,color,note,isIncome,featured,isFinal});
  };
  const key=`${year}-${String(month+1).padStart(2,'0')}`;
  const dim=new Date(year,month+1,0).getDate();
  const fromDay=(year===2026&&month===3)?22:1;
  const karenAmt=S.karenLastPay||S.karenAvgPay||762;
  const phaseDone=S.phaseDone||{};

  // Paycheck note
  const nextPending=EXPENSE_PHASES.find(p=>!phaseDone[p.id]);
  const pcNote=nextPending?`→ Saving for ${nextPending.label} ($${nextPending.cost.toLocaleString()})`:'→ Transfer surplus to snowball same day';

  if(7>=fromDay)add(7,'Jon paycheck',JON_PAY,'#97C459',pcNote,true);
  if(22>=fromDay)add(22,'Jon paycheck',JON_PAY,'#97C459',pcNote,true);
  for(let d=fromDay;d<=dim;d++){if(new Date(year,month,d).getDay()===4)add(d,'Karen paycheck — Copans',karenAmt,'#97C459','→ Transfer full amount to #4496 same day',true);}
  for(let d=fromDay;d<=dim;d++){if(new Date(year,month,d).getDay()===0)add(d,'Fresh Market',-200,'#85B7EB','$200/wk hard limit');}

  // Transport
  if(1>=fromDay){add(1,'SunPass',-20,'#666660','Tolls');add(1,'Gas',-60,'#666660','Gasoline');}
  add(15,'Gas',-60,'#666660','Gasoline');
  if(7>=fromDay)add(7,'Car wash',-11,'#666660','Biweekly');
  add(21,'Car wash',-11,'#666660','Biweekly');

  // Logged discretionary spends
  (S.discLog||[]).forEach(e=>{
    if(!e.date||!e.amt)return;
    const sp=new Date(e.date);
    if(isNaN(sp.getTime()))return;
    if(sp.getMonth()===month&&sp.getFullYear()===year)
      add(sp.getDate(),e.label||'Discretionary spend',-Math.abs(e.amt),'#85B7EB','Logged spend');
  });

  // Helper: hide bill after roadmap payoff date
  const notDone=(id)=>{const dk=roadmap[id+'-done'];return!dk||dk.date.substring(0,7)>=key;};

  if([0,3,6,9].includes(month))add(2,'Real-Debrid',-11,'#666660','Quarterly $11');
  if(key<='2026-05'&&notDone('amazon'))add(1,'Amazon Store Card',-29,'#F09595','~29% APR');
  add(2,'Amazon Prime',-15,'#666660','Subscription');
  add(4,'PayPal eBay',-43,'#EF9F27','35.99% APR · done Aug 2027');
  add(4,'ChatGPT',-22,'#666660','Karen subscription');
  add(4,'Zelle Randy',-150,'#97C459','Biweekly training');
  add(18,'Zelle Randy',-150,'#97C459','Biweekly training');
  if(notDone('mazda'))add(9,'Mazda CX-5',-638,'#EF9F27','12.72% APR · payoff calculated');
  if(notDone('merrick'))add(11,'Merrick Bank',-35,'#F09595','31.95% APR');
  if(key<='2026-10')add(13,'Affirm cluster',-131,'#b4b2a9','0% APR — verify in Affirm app');
  if(key<='2027-01')add(13,'PayPal Newegg',-61,'#EF9F27','35.99% APR fixed');
  if(notDone('kpaypal'))add(13,'Karen PayPal Credit',-100,'#F09595','29.64% APR — MANUAL');
  add(13,'Claude.ai',-20,'#666660','Subscription');
  add(15,'T-Mobile',-152,'#b4b2a9','Both phones');
  if(notDone('irs')){add(15,'IRS payment #1',-68,'#EF9F27','Installment plan');add(16,'IRS payment #2',-35,'#EF9F27','Installment plan');}
  add(16,'AT&T fiber',-166,'#b4b2a9','Internet');
  add(22,'Jon PayPal Credit',-22,'#b4b2a9','0% plan — do NOT overpay');
  if(notDone('tn')&&key<='2027-12')add(22,'TN unemployment',-153,'#EF9F27','~$153/mo');
  add(22,'Spotify',-22,'#666660','Subscription');
  add(23,'State Farm',-190,'#b4b2a9','Auto insurance');
  if(notDone('chase'))add(26,'Chase/Amazon',-26,'#b4b2a9','APR TBD');
  if(key<='2027-03'&&!(year===2026&&month===3))add(30,'PayPal Chinese vendor',-95,'#EF9F27','24.99% APR fixed');

  // Expense phase events from roadmap
  EXPENSE_PHASES.forEach(phase=>{
    if(phaseDone[phase.id]||phase.isSavings)return;
    const m=roadmap[phase.id];
    if(m){
      const ed=new Date(m.date+'T12:00:00');
      if(ed.getFullYear()===year&&ed.getMonth()===month)
        add(ed.getDate(),phase.label.toUpperCase(),-phase.cost,'#EF9F27',`Budget $${phase.cost.toLocaleString()} · calculated affordable date`,false,true);
    }
  });

  // April 2026 one-time
  if(year===2026&&month===3){
    add(23,'Vehicle registration',-220,'#F09595','One-time renewal');
  }

  // Snowball payment events -- computed from balLog diff
  // Find which target is active on each paycheck day by checking roadmap payoff dates
  const ssDate=roadmap['snowball-start']?.date;
  if(ssDate){
    for(let dd=fromDay;dd<=dim;dd++){
      const dow2=new Date(year,month,dd).getDay();
      if(!(dd===7||dd===22||dow2===4))continue;
      const eventDate=`${year}-${String(month+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      if(eventDate<ssDate)continue;

      // Find which target is active on this specific date
      const activeTarget=SNOWBALL_TARGETS.find(t=>{
        const startedBy=ssDate<=eventDate; // snowball started
        if(!startedBy)return false;
        const doneKey=t.id+'-done';
        const done=roadmap[doneKey];
        // Target is active if not yet done, or done on/after this date
        return!done||(done.date>=eventDate);
      });
      if(!activeTarget)continue;

      // Compute payment from balLog
      const prevDate=new Date(year,month,dd-1).toISOString().split('T')[0];
      const prevBal=balLog[prevDate];
      const todayBal=balLog[eventDate];
      if(prevBal===undefined||todayBal===undefined)continue;
      const todayNet=getDailyBills(year,month,dd).reduce((a,b)=>a+b.amt,0);
      const paymentAmt=Math.round(prevBal+todayNet-todayBal);
      if(paymentAmt<=0)continue;

      // Check if this is the final payment (target done on this date)
      const doneOnDate=roadmap[activeTarget.id+'-done']?.date===eventDate;
      const title=doneOnDate
        ?`${activeTarget.label} — cleared`
        :`Pay $${paymentAmt.toLocaleString()} → ${activeTarget.label}`;
      const note=doneOnDate?'Final payment · debt closed':'Mandatory snowball · log into card and pay now';

      // Don't show the regular minimum bill line if snowball closes it today
      // (handled by notDone check above which uses month granularity, fine)

      evts.push({day:dd,title,amt:-paymentAmt,color:doneOnDate?'var(--pur)':'#97C459',note,isIncome:false,featured:true,isFinal:doneOnDate});
    }
  }

  evts.sort((a,b)=>a.day-b.day);
  return evts;
}

  // Bills due

  // Next 7 days
  const weekEvts=evts.filter(e=>e.day>=today&&e.day<=today+7);

  const days=Object.keys(byDay).map(Number).sort((a,b)=>a-b);
  if(days.length){

    days.forEach(day=>{

      byDay[day].forEach(e=>{
        const ac=e.isIncome?'var(--grn)':Math.abs(e.amt||0)>500?'var(--red)':'var(--t2)';
        const as=typeof e.amt==='number'&&e.amt!==0?(e.amt>0?'+$'+e.amt.toLocaleString():'-$'+Math.abs(e.amt).toLocaleString()):'';
        html+=`<div class="event" style="padding:5px 0;${e.featured?`border-left:2px solid ${e.isFinal?'var(--pur)':e.color};padding-left:8px;margin-left:-8px;`:''}">
          <div class="edot" style="background:${e.color};margin-top:4px;${e.featured?'display:none;':''}"></div>
          <div class="econtent">
            <div class="etitle" style="font-size:12px;${e.featured?`font-weight:700;color:${e.isFinal?'var(--pur)':e.color};`:''}">${e.title}</div>
            ${e.note?`<div class="esub">${e.note}</div>`:''}
          </div>
          ${as?`<div class="eamt" style="color:${ac};font-size:12px;${e.featured?'font-weight:700;':''}">${as}</div>`:''}
        </div>`;
      });
      html+='</div>';
    });
    html+=`</div>`;
  }

  // Spending pool
  const spent=S.discSpent||0;
  const rem=Math.max(0,200-spent);
  const pct=Math.min(100,(spent/200)*100);
  const sc=pct>80?'var(--red)':pct>50?'var(--amb)':'var(--grn)';
  const cw=Math.min(3,Math.floor((today-1)/7));
  html+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <div class="ct" style="margin-bottom:0;">Discretionary — ${MONTHS[now.getMonth()].substring(0,3)}</div>
      <div style="font-size:11px;color:var(--t3);">$200/mo cap</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4px;">
      <div style="font-size:26px;font-weight:700;color:${sc};">$${rem.toFixed(0)} <span style="font-size:12px;color:var(--t3);font-weight:400;">left</span></div>
      <div style="font-size:13px;color:var(--red);font-weight:700;">$${spent.toFixed(2)} used</div>
    </div>
    <div class="prog"><div class="progfill" style="width:${pct}%;background:${sc};"></div></div>
    <div class="wgrid">
      ${['Wk1','Wk2','Wk3','Wk4'].map((l,i)=>{
        const st=(S.weeks||[])[i];
        const cls=st==='used'?'used':i===cw?'cur':'';
        return `<div class="wp ${cls}" onclick="toggleWeek(${i})"><div class="wplabel">${l}</div><div class="wpval">${st==='used'?'-$50':'$50'}</div></div>`;
      }).join('')}
    </div>
    <div style="font-size:10px;color:var(--t3);margin-bottom:6px;">Tap week to mark $50 used · Tap again to undo</div>
    <div style="display:flex;gap:6px;">
      <button class="btn btnr btnsm" style="flex:1;margin:0;" onclick="openModal('spend','Log spend',true)">➕ Log spend</button>
      <button class="btn btno btnsm" style="flex:1;margin:0;" onclick="openModal('unexpected','Unexpected charge',true,true)">⚠ Unexpected</button>
    </div>
  </div>`;

  // Randy
  const rs=(S.randySessions||[]).filter(s=>{const d=new Date(s.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const rt=rs.reduce((a,s)=>a+s.amt,0);
  html+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${rs.length?'10px':'0'};">
      <div>
        <div class="ct" style="margin-bottom:2px;">Randy — training</div>
        <div style="font-size:22px;font-weight:700;color:var(--grn);">$${rt} <span style="font-size:12px;color:var(--t3);font-weight:400;">${rs.length} session${rs.length!==1?'s':''}</span></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
        <button class="btn btng btnsm" style="width:auto;margin:0;padding:10px 16px;" onclick="logRandy()">✓ $150</button>
        ${rs.length?`<button class="btn btnr btnsm" style="width:auto;margin:0;padding:6px 12px;font-size:11px;" onclick="undoRandy()">Undo</button>`:''}
      </div>
    </div>
    ${rs.length?`<div>${rs.slice(0,3).map((s,i)=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-top:0.5px solid var(--br);"><span style="color:var(--t2);">Session ${rs.length-i} · ${s.date}</span><span style="color:var(--grn);">$${s.amt}</span></div>`).join('')}</div>`:''}
  </div>`;

  // Karen pay
  html+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div class="ct" style="margin-bottom:2px;">Karen's last pay</div>
        <div style="font-size:18px;font-weight:700;color:var(--amb);">$${S.karenLastPay||762}</div>
        <div style="font-size:11px;color:var(--t3);">Update every Thursday · affects projections</div>
      </div>
      <button class="btn btna btnsm" style="width:auto;margin:0;padding:10px 16px;" onclick="openModal('karen-pay','Karen\\'s actual pay')">Update</button>
    </div>
  </div>`;

  // Unexpected
  const unexp=S.unexpected||[];
  if(unexp.length){
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="ct" style="margin-bottom:0;">Unexpected charges</div>
        <button class="btn btno btnsm" style="width:auto;margin:0;padding:4px 10px;font-size:11px;" onclick="clearUnexpected()">Clear</button>
      </div>
      ${unexp.slice(0,5).map(e=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--br);font-size:12px;"><div><div style="font-weight:600;color:var(--tx);">${e.label}</div><div style="color:var(--t3);">#${e.acct} · ${e.date}</div></div><div style="color:var(--red);font-weight:700;">-$${e.amt.toFixed(2)}</div></div>`).join('')}
    </div>`;

  // Spend log
  const log=S.discLog||[];
  if(log.length){
    html+=`<div class="card"><div class="ct">Spend log</div>

      <button class="btn btno btnsm" style="margin-top:8px;" onclick="resetSpend()">Reset month</button>
    </div>`;
  }

  document.getElementById('week-content').innerHTML=html;
}

window.logSnowballPayment=function(amt){
  if(!S.snowballLog)S.snowballLog=[];
  const ct=SNOWBALL_TARGETS.find(t=>{const b=(S.cardBals&&S.cardBals[t.id]!==undefined)?S.cardBals[t.id]:t.startBal;return b>0;});
  if(!ct)return;
  if(!S.cardBals)S.cardBals={};
  const prev=(S.cardBals[ct.id]!==undefined)?S.cardBals[ct.id]:ct.startBal;
  S.cardBals[ct.id]=Math.max(0,prev-amt);
  S.snowballLog.unshift({amt,target:ct.label,date:new Date().toLocaleDateString()});
  save(S);renderAll();toast(`$${amt.toLocaleString()} paid to ${ct.label} ✓`);
};
window.markPhaseDone=function(id){
  if(!S.phaseDone)S.phaseDone={};
  S.phaseDone[id]=true;
  if(id==='jon-tires')S.phaseDone['repair-buf']=true;
  save(S);renderAll();toast('Phase complete ✓');
};
window.confirmAction=function(id){if(!S.confirmed)S.confirmed={};S.confirmed[id]=true;save(S);renderWeek();toast('Confirmed ✓');};

// ── RENDER MONTH ──
let vMonth=now.getMonth(),vYear=now.getFullYear();
window.changeMonth=function(dir){vMonth+=dir;if(vMonth>11){vMonth=0;vYear++;}if(vMonth<0){vMonth=11;vYear--;}renderMonth();};

function renderMonth(){
  document.getElementById('month-title').textContent=`${MONTHS[vMonth]} ${vYear}`;
  const {milestones:roadmap,balLog}=calcRoadmap();
  const evts=getMonthEvents(vYear,vMonth,roadmap,balLog);
  const startDay=(vYear===2026&&vMonth===3)?22:1;
  const isCurrentMonth=vYear===now.getFullYear()&&vMonth===now.getMonth();

  // Starting balance from balLog
  let runBal=S.bal4496;
  if(!isCurrentMonth){
    const prevEnd=new Date(vYear,vMonth,0);
    for(let d=new Date(prevEnd);d>=new Date(now.getFullYear(),now.getMonth(),now.getDate());d.setDate(d.getDate()-1)){
      const k=d.toISOString().split('T')[0];
      if(balLog[k]!==undefined){runBal=balLog[k];break;}
    }
  }

  const totalIn=evts.filter(e=>e.isIncome&&e.day>=startDay).reduce((a,e)=>a+(e.amt||0),0);
  const totalOut=evts.filter(e=>!e.isIncome&&e.day>=startDay&&typeof e.amt==='number'&&e.amt<0).reduce((a,e)=>a+Math.abs(e.amt),0);
  const net=totalIn-totalOut;

  let html=`<div class="card">
    <div class="ct">Month overview</div>
    <div class="row"><div class="rl"><div class="rlabel">Expected income</div></div><div class="rval" style="color:var(--grn);">+$${totalIn.toLocaleString()}</div></div>
    <div class="row"><div class="rl"><div class="rlabel">Bills + spending</div></div><div class="rval" style="color:var(--red);">-$${totalOut.toLocaleString()}</div></div>
    <div class="row"><div class="rl"><div class="rlabel">Starting #4496</div></div><div class="rval" style="color:var(--blu);">$${Math.round(runBal).toLocaleString()}</div></div>
    <div class="row"><div class="rl"><div class="rlabel" style="font-weight:700;">Net</div></div><div class="rval" style="color:${net>=0?'var(--grn)':'var(--red)'};">${net>=0?'+':'-'}$${Math.abs(net).toLocaleString()}</div></div>
  </div>`;

  const byDay={};
  evts.forEach(e=>{if(e.day>=startDay){if(!byDay[e.day])byDay[e.day]=[];byDay[e.day].push(e);}});
  const sortedDays=Object.keys(byDay).map(Number).sort((a,b)=>a-b);
  let weekDays=[],weeks=[];
  sortedDays.forEach((day,i)=>{
    weekDays.push(day);
    if(new Date(vYear,vMonth,day).getDay()===6||i===sortedDays.length-1){weeks.push([...weekDays]);weekDays=[];}
  });

  weeks.forEach(wdays=>{
    const wStart=wdays[0],wEnd=wdays[wdays.length-1];
    const mn=MONTHS[vMonth].substring(0,3);
    const allW=wdays.flatMap(d=>byDay[d]);
    const wIn=allW.filter(e=>e.isIncome).reduce((a,e)=>a+(e.amt||0),0);
    const wOut=allW.filter(e=>!e.isIncome&&typeof e.amt==='number'&&e.amt<0).reduce((a,e)=>a+Math.abs(e.amt),0);
    html+=`<div class="card"><div class="wheader"><span>${mn} ${wStart}–${wEnd}</span><span>${wIn>0?`<span style="color:var(--grn);">+$${wIn.toLocaleString()}</span> `:''}${wOut>0?`<span style="color:var(--red);">-$${wOut.toLocaleString()}</span>`:''}</span></div>`;
    wdays.forEach(day=>{
      const isToday=isCurrentMonth&&day===now.getDate();
      const isPast=isCurrentMonth&&day<now.getDate();
      const dow=DAYS[new Date(vYear,vMonth,day).getDay()];
      const dayKey=`${vYear}-${String(vMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dayEndBal=balLog[dayKey];
      const isFuture=!isCurrentMonth||day>now.getDate();
      html+=`<div style="${isPast?'opacity:0.5;':''}margin-bottom:2px;"><div style="font-size:10px;color:${isToday?'var(--amb)':'var(--t3)'};font-weight:700;padding:4px 0 2px;text-transform:uppercase;letter-spacing:.04em;">${isToday?'TODAY — ':''}${dow} ${day}</div>`;
      const dayEvts=byDay[day]||[];
      dayEvts.forEach(e=>{
        const amtNum=typeof e.amt==='number'?e.amt:0;
        const ac=e.isIncome?'var(--grn)':Math.abs(amtNum)>500?'var(--red)':'var(--t2)';
        const as=amtNum!==0?(amtNum>0?'+$'+amtNum.toLocaleString():'-$'+Math.abs(amtNum).toLocaleString()):'';
        html+=`<div class="event" style="padding:5px 0;${e.featured?`border-left:2px solid ${e.isFinal?'var(--pur)':e.color};padding-left:8px;margin-left:-8px;`:''}">
          <div class="edot" style="background:${e.color};margin-top:4px;${e.featured?'display:none;':''}"></div>
          <div class="econtent">
            <div class="etitle" style="font-size:13px;${e.featured?`font-weight:700;color:${e.isFinal?'var(--pur)':e.color};`:''}">${e.title}</div>
            ${e.note?`<div class="esub">${e.note}</div>`:''}
          </div>
          ${as?`<div class="eamt" style="color:${ac};${e.featured?'font-weight:700;':''}">${as}</div>`:''}
        </div>`;
      });
      // Day summary
      if(isFuture&&dayEndBal!==undefined){
        const balWarn=dayEndBal<300;
        const balColor=dayEndBal<300?'var(--red)':dayEndBal<600?'var(--amb)':'var(--blu)';
        const dayNet=dayEvts.reduce((a,e)=>a+(typeof e.amt==='number'?e.amt:0),0);
        const netColor=dayNet>0?'var(--grn)':dayNet<0?'var(--red)':'var(--t3)';
        const netStr=dayNet!==0?(dayNet>0?`+$${dayNet.toLocaleString()}`:`-$${Math.abs(dayNet).toLocaleString()}`):'';
        html+=`<div style="display:flex;justify-content:flex-end;align-items:center;gap:6px;padding:4px 0 6px;border-top:0.5px solid var(--br);margin-top:3px;">
          ${netStr?`<span style="font-size:11px;font-weight:600;color:${netColor};">${netStr}</span><span style="font-size:10px;color:var(--t3);">·</span>`:''}
          <span style="font-size:12px;font-weight:700;color:${balColor};">$${Math.round(dayEndBal).toLocaleString()}${balWarn?' ⚠':''}</span>
        </div>`;
      }
      html+='</div>';
    });
    html+=`</div>`;
  });
  const prevM=(vMonth-1+12)%12; const prevY=vMonth===0?vYear-1:vYear;
  const nextM=(vMonth+1)%12; const nextY=vMonth===11?vYear+1:vYear;
  const prevLabel=`← ${MONTHS[prevM].substring(0,3)} '${String(prevY).slice(2)}`;
  const nextLabel=`${MONTHS[nextM].substring(0,3)} '${String(nextY).slice(2)} →`;
  document.getElementById('month-content').innerHTML=html+`
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="btn btno" style="flex:1;" onclick="changeMonth(-1)">${prevLabel}</button>
      <button class="btn btno" style="flex:1;" onclick="changeMonth(1)">${nextLabel}</button>
    </div>`;
}

  html+=`<div class="card">
    <div class="ct">Calculated milestones</div>
    <div class="milestone"><div class="ms-label">All CCs paid off</div><div class="ms-date ms-soon">${roadmap['chase-done']?new Date(roadmap['chase-done'].date+'T12:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}):'...'}</div></div>
    <div class="milestone"><div class="ms-label">TN Unemployment done</div><div class="ms-date ms-soon">${roadmap['tn-done']?new Date(roadmap['tn-done'].date+'T12:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}):'...'}</div></div>
    <div class="milestone"><div class="ms-label" style="font-weight:700;">Consumer debt free</div><div class="ms-date ms-future" style="font-size:15px;">${roadmap['irs-done']?new Date(roadmap['irs-done'].date+'T12:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}):'...'}</div></div>
    <div class="milestone"><div class="ms-label">Mazda payoff</div><div class="ms-date ms-future">${roadmap['mazda-done']?new Date(roadmap['mazda-done'].date+'T12:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}):'...'}</div></div>
    <div class="milestone"><div class="ms-label" style="font-weight:700;color:var(--pur);">Totally debt free</div><div class="ms-date" style="color:var(--pur);font-size:15px;">${roadmap['mazda-done']?new Date(roadmap['mazda-done'].date+'T12:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}):'...'}</div></div>
  </div>`;

  html+=`<div class="card"><div class="ct">Payment log</div>`;
  const log=S.snowballLog||[];
  if(!log.length)html+='<div style="font-size:13px;color:var(--t3);">No payments logged yet</div>';
  else html+=log.slice(0,8).map(e=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--br);font-size:12px;"><span style="color:var(--t2);">${e.target} · ${e.date}</span><span style="color:var(--grn);">-$${e.amt.toFixed(2)}</span></div>`).join('');
  html+=`</div>`;

  document.getElementById('snowball-content').innerHTML=html;
}

// ── SPENDING ──
function addSpend(amt,label){
  S.discSpent=(S.discSpent||0)+amt;
  S.bal4496=Math.max(0,S.bal4496-amt);
  (S.discLog=S.discLog||[]).unshift({type:'spend',amt,date:new Date().toLocaleDateString(),label});
  save(S);renderAll();toast(`-$${amt.toFixed(2)} logged`);
}
function addUnexpected(label,acct,amt){
  if(!S.unexpected)S.unexpected=[];
  S.unexpected.unshift({label,acct,amt,date:new Date().toLocaleDateString()});
  if(acct==='4496')S.bal4496=Math.max(0,S.bal4496-amt);
  if(acct==='savings')S.bal0725=Math.max(0,S.bal0725-amt);
  if(acct==='6764')S.bal6764=Math.max(0,S.bal6764-amt);
  save(S);renderAll();toast(`$${amt.toFixed(2)} logged`);
}
window.clearUnexpected=()=>{S.unexpected=[];save(S);renderWeek();toast('Cleared');};
window.resetSpend=()=>{if(!confirm('Reset month?'))return;S.discSpent=0;S.discLog=[];S.weeks=[null,null,null,null];save(S);renderWeek();toast('Reset');};
window.toggleWeek=function(i){
  if(!S.weeks)S.weeks=[null,null,null,null];
  if(S.weeks[i]===null){S.weeks[i]='used';S.discSpent=(S.discSpent||0)+50;S.bal4496=Math.max(0,S.bal4496-50);(S.discLog=S.discLog||[]).unshift({type:'spend',amt:50,date:`Wk${i+1}`,label:`Week ${i+1} allowance`});}
  else{S.weeks[i]=null;S.discSpent=Math.max(0,(S.discSpent||0)-50);S.bal4496+=50;if(S.discLog&&S.discLog.length)S.discLog.shift();}
  save(S);renderWeek();
};
window.logRandy=function(){
  if(!S.randySessions)S.randySessions=[];
  S.randySessions.unshift({date:new Date().toLocaleDateString(),amt:150});
  S.bal4496=Math.max(0,S.bal4496-150);
  save(S);renderWeek();toast('Session logged — $150');
};
window.undoRandy=function(){
  if(!S.randySessions||!S.randySessions.length)return;
  S.bal4496+=S.randySessions[0].amt;
  S.randySessions.shift();
  save(S);renderWeek();toast('Removed');
};
function logSnowballPmt(amt){
  if(!S.snowballLog)S.snowballLog=[];
  const ct=SNOWBALL_TARGETS.find(t=>{const b=(S.cardBals&&S.cardBals[t.id]!==undefined)?S.cardBals[t.id]:t.startBal;return b>0;});
  S.snowballLog.unshift({amt,target:ct?ct.label:'Unknown',date:new Date().toLocaleDateString()});
  if(ct){if(!S.cardBals)S.cardBals={};S.cardBals[ct.id]=Math.max(0,((S.cardBals[ct.id]!==undefined)?S.cardBals[ct.id]:ct.startBal)-amt);}
  save(S);renderSnowball();toast(`$${amt.toFixed(2)} logged`);
}
